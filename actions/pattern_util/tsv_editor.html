            toggleSelectAll(cbAll.checked);
        });
        thCheck.appendChild(cbAll);
        tr.appendChild(thCheck);

        // Row num header
        const thNum = document.createElement('th');
        thNum.className = 'col-rownum';
        thNum.textContent = '#';
        tr.appendChild(thNum);

        // Data headers (display order)
        for (const i of S.displayOrder) {
            const th = document.createElement('th');

            if (i === 'tree') {
                // Virtual tree column header
                th.textContent = '\u2283 Tree';
                th.className = 'col-tree';
                th.title = 'Containment tree — prefix patterns whose tinyIds fully contain children';
                th.addEventListener('click', () => toggleTreeSort());
            } else {
                th.textContent = S.headers[i];
                th.dataset.col = i;
                // Column width classes
                if (i === S.decisionCol) th.classList.add('col-decision');
                if (i === S.tinyidCountCol) th.classList.add('col-tinyid-count');

                // Sort arrow
                if (S.sortCol === i) {
                    const arrow = document.createElement('span');
                    arrow.className = 'sort-arrow';
                    arrow.textContent = S.sortAsc ? '\u25B2' : '\u25BC';
                    th.appendChild(arrow);
                }

                th.addEventListener('click', () => onHeaderClick(i));
            }
            tr.appendChild(th);
        }
        thead.appendChild(tr);

        // Filter row
        const trFilter = document.createElement('tr');
        trFilter.className = 'filter-row';

        // Empty cells for checkbox + rownum
        const fCheck = document.createElement('th');
        fCheck.className = 'col-check';
        trFilter.appendChild(fCheck);
        const fNum = document.createElement('th');
        fNum.className = 'col-rownum';
        trFilter.appendChild(fNum);

        for (const i of S.displayOrder) {
            const th = document.createElement('th');

            // Tree column: dropdown filter
            if (i === 'tree') {
                const sel = document.createElement('select');
                sel.className = 'filter-select';
                sel.dataset.col = 'tree';
                const opts = [
                    ['', '(all)'],
                    ['root', '\u25BC root'],
                    ['child', '\u2283 child'],
                    ['none', '\u2014 none'],
                ];
                for (const [val, label] of opts) {
                    const o = document.createElement('option');
                    o.value = val;
                    o.textContent = label;
                    sel.appendChild(o);
                }
                if (S.filters['tree']) {
                    sel.value = S.filters['tree'];
                    sel.classList.add('active');
                }
                sel.addEventListener('change', (e) => onFilterChange('tree', e.target.value, e.target));
                th.appendChild(sel);
            }
            // Decision column: use dropdown filter
            else if (i === S.decisionCol && S.decisionCol >= 0) {
                const sel = document.createElement('select');
                sel.className = 'filter-select';
                sel.dataset.col = i;
                const opts = [
                    ['', '(all)'],
                    ['=blank', 'blank'],
                    ['!blank', 'filled'],
                    ['strip', 'strip'],
                    ['skip', 'skip'],
                    ['modify', 'modify'],
                    ['substitute', 'substitute'],
                    ['followup', 'followup'],
                ];
                for (const [val, label] of opts) {
                    const o = document.createElement('option');
                    o.value = val;
                    o.textContent = label;
                    sel.appendChild(o);
                }
                if (S.filters[i]) {
                    sel.value = S.filters[i];
                    sel.classList.add('active');
                }
                sel.addEventListener('change', (e) => onFilterChange(i, e.target.value, e.target));
                th.appendChild(sel);
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'filter-input';
                input.placeholder = 'Filter...';
                input.dataset.col = i;
                if (S.filters[i]) {
                    input.value = S.filters[i];
                    input.classList.add('active');
                }
                input.addEventListener('input', (e) => onFilterChange(i, e.target.value, e.target));
                th.appendChild(input);
            }
            trFilter.appendChild(th);
        }
        thead.appendChild(trFilter);
    }

    function renderBody() {
        tbody.innerHTML = '';
        _treeRowById = null; // invalidate row-by-id cache
        const visible = getVisibleRows();

        for (let vi = 0; vi < visible.length; vi++) {
            const row = visible[vi];
            const tr = createRowElement(row, vi);
            tbody.appendChild(tr);
        }
    }

    function createRowElement(row, displayIndex) {
        const tr = document.createElement('tr');
        tr.dataset.rowId = row.id;
        tr.draggable = true;

        if (row.selected) tr.classList.add('selected');

        // Field profile coloring
        if (S.fpCol >= 0 && row.cells[S.fpCol]) {
            const fp = row.cells[S.fpCol].trim().replace(/[_ ]/g, '-').toLowerCase();
            if (fp) tr.classList.add('fp-' + fp);
        }

        // Group border (right side, avoids conflict with field_profile left border)
        if (S.notesCol >= 0) {
            const groupNum = _extractGroupNum(row.cells[S.notesCol] || '');
            if (groupNum > 0) {
                const colorIdx = ((groupNum - 1) % 8) + 1;
                tr.classList.add('group-border-' + colorIdx);
            }
        }

        // Check if visible
        if (!rowMatchesFilters(row)) {
            tr.classList.add('hidden');
        }

        // Checkbox — click handler on the whole cell for a larger hit target
        const tdCheck = document.createElement('td');
        tdCheck.className = 'col-check';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = row.selected;
        tdCheck.addEventListener('click', (e) => {
            e.stopPropagation();
            cb.checked = !cb.checked;
            onRowCheckbox(row.id, cb.checked, e);
        });
        tdCheck.appendChild(cb);
        tr.appendChild(tdCheck);

        // Row number
        const tdNum = document.createElement('td');
        tdNum.className = 'col-rownum';
        tdNum.textContent = displayIndex + 1;
        tr.appendChild(tdNum);

        // Data cells (display order)
        for (const i of S.displayOrder) {
            const td = document.createElement('td');

            // Virtual tree column
            if (i === 'tree') {
                td.className = 'col-tree';
                _renderTreeCell(td, row);
                tr.appendChild(td);
                continue;
            }

            const value = row.cells[i] || '';

            if (i === S.tinyidCountCol && S.tinyidCountCol >= 0) {
                td.textContent = value;
                td.classList.add('col-tinyid-count');
                td.style.textAlign = 'right';
                td.style.color = '#666';
                td.style.backgroundColor = '#f8f8f8';
                td.title = value + ' CDEs';
            } else if (S.tinyIdCols.includes(i) && value) {
                renderTinyIdCell(td, value, row.id);
            } else if (i === S.decisionCol && S.decisionCol >= 0 && value.trim()) {
                // Decision column: render as color-coded badge
                td.classList.add('col-decision');
                const badge = document.createElement('span');
                const dv = value.trim().toLowerCase();
                badge.className = 'decision-badge decision-' + dv;
                badge.textContent = value.trim();
                td.appendChild(badge);
                td.title = 'Double-click to change';
            } else if (i === S.notesCol && S.notesCol >= 0) {
                // Notes column: show text + group badge if present
                td.textContent = value;
                td.title = value.length > 50 ? value : '';
                const groupNum = _extractGroupNum(value);
                if (groupNum > 0) {
                    const gbadge = document.createElement('span');
                    const colorIdx = ((groupNum - 1) % 8) + 1;
                    gbadge.className = 'group-badge group-badge-' + colorIdx;
                    gbadge.textContent = 'G' + groupNum;
                    td.appendChild(gbadge);
                }
            } else {
                td.textContent = value;
                td.title = value.length > 50 ? value : '';
            }

            td.dataset.col = i;
            td.addEventListener('dblclick', () => startEdit(row.id, i));
            tr.appendChild(td);
        }

        // Drag events for reorder
        tr.addEventListener('dragstart', (e) => onDragStart(e, row.id));
        tr.addEventListener('dragover', (e) => onDragOver(e, tr));
        tr.addEventListener('dragleave', () => { tr.classList.remove('drag-over-top', 'drag-over-bottom'); });
        tr.addEventListener('drop', (e) => onDrop(e, row.id, tr));
        tr.addEventListener('dragend', clearDragIndicators);

        return tr;
    }

    // ===== GROUP HELPER =====
    function _extractGroupNum(notesText) {
        const m = notesText.match(/\bG(\d+)\b/);
        return m ? parseInt(m[1], 10) : 0;
    }

    // ===== TREE CELL RENDERING =====
    // Cached pattern column index (set during _buildContainmentTree)
    let _treePatCol = -1;
    // Row-by-id lookup (rebuilt each render cycle)
    let _treeRowById = null;

    function _getTreeRowById() {
        if (!_treeRowById) {
            _treeRowById = new Map();
            for (const r of S.rows) _treeRowById.set(r.id, r);
        }
        return _treeRowById;
    }

    function _renderTreeCell(td, row) {
        if (!S.hasTree) return;
        const depth = S.treeDepth[row.id] || 0;
        const children = S.treeChildren[row.id] || [];
        const parentId = S.treeParent[row.id];
        const descCount = S.treeDescCount[row.id] || 0;
        const rowMap = _getTreeRowById();

        if (children.length > 0) {
            // Root or intermediate parent — show expand/collapse toggle + descendant count
            const toggle = document.createElement('span');
            toggle.className = 'tree-toggle';
            const collapsed = S.collapsedTrees.has(row.id);
            toggle.textContent = collapsed ? '\u25B6' : '\u25BC'; // ▶ or ▼
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (S.collapsedTrees.has(row.id)) S.collapsedTrees.delete(row.id);
                else S.collapsedTrees.add(row.id);
                renderBody();
            });
            td.appendChild(toggle);

            const badge = document.createElement('span');
            badge.className = 'tree-desc-count';
            badge.textContent = descCount;
            badge.title = descCount + ' contained descendant' + (descCount !== 1 ? 's' : '');
            td.appendChild(badge);

            // Show depth dots for intermediate parents (depth > 0)
            if (depth > 0) {
                const parentRow = rowMap.get(parentId);
                const pPat = parentRow ? (parentRow.cells[_treePatCol] || '').trim() : '';
                const dots = '\u00B7'.repeat(depth) + ' ';
                td.insertBefore(document.createTextNode(dots), toggle);
                td.title = '\u2283 ' + pPat;
            }
        } else if (parentId !== undefined) {
            // Leaf child — show depth indicator + parent reference
            const parentRow = rowMap.get(parentId);
            const pPat = parentRow ? (parentRow.cells[_treePatCol] || '').trim() : '';
            const truncPat = pPat.length > 20 ? pPat.slice(0, 18) + '\u2026' : pPat;

            const dots = document.createElement('span');
            dots.className = 'tree-depth-dot';
            dots.textContent = '\u00B7'.repeat(depth) + ' ';
            td.appendChild(dots);

            const ref = document.createElement('span');
            ref.className = 'tree-child-ref';
            ref.textContent = '\u2283 ' + truncPat;
            td.appendChild(ref);
            td.title = 'Contained by: ' + pPat;
        }
        // Singletons: leave empty
    }

    // ===== TINYID CELL RENDERING =====
    function renderTinyIdCell(td, value, rowId) {
        const ids = value.split(/[\s|]+/).filter(Boolean);
        const expanded = S.expandedTids.has(rowId + '-' + td.dataset?.col);

        td.className = 'tinyid-cell';

        if (expanded && ids.length > 3) {
            td.classList.add('tinyid-expanded');
            const pills = document.createElement('div');
            pills.className = 'tid-pills';
            for (const id of ids) {
                const pill = document.createElement('span');
                pill.className = 'tid-pill';
                pill.textContent = id;
                pills.appendChild(pill);
            }
            td.appendChild(pills);
        } else {
            td.classList.add('tinyid-collapsed');
            if (ids.length > 3) {
                const count = document.createElement('span');
                count.className = 'tid-count';
                count.textContent = ids.length + ' IDs';
                td.appendChild(count);

                const preview = document.createElement('span');
                preview.className = 'tid-preview';
                preview.textContent = ids.slice(0, 3).join(', ') + '...';
                td.appendChild(preview);
            } else {
                td.textContent = ids.join(' ');
            }
        }

        // Store col for toggle
        td.dataset.col = td.dataset.col || '';
        td.addEventListener('click', (e) => {
            if (e.detail === 1 && ids.length > 3) {
                // Single click toggles expand/collapse (but not on double-click for edit)
                const key = rowId + '-' + td.dataset.col;
                if (S.expandedTids.has(key)) S.expandedTids.delete(key);
                else S.expandedTids.add(key);
                renderBody();
            }
        });
    }

    // ===== SORTING =====
    function onHeaderClick(col) {
        // Disable tree sort when user manually sorts a column
        if (S.treeSorted) {
            S.treeSorted = false;
            setAction('Tree sort OFF');
        }

        if (S.sortCol === col) {
            if (S.sortAsc) {
                S.sortAsc = false;
            } else {
                // Third click: unsort
                S.sortCol = -1;
            }
        } else {
            S.sortCol = col;
            S.sortAsc = true;
        }
        sortRows();
        renderGrid();
    }

    function sortRows() {
        if (S.sortCol < 0) return;
        const col = S.sortCol;
        const asc = S.sortAsc;

        // Detect if column is numeric
        const isNumeric = S.rows.every(r => {
            const v = (r.cells[col] || '').trim();
            return v === '' || !isNaN(Number(v));
        });

        S.rows.sort((a, b) => {
            let va = (a.cells[col] || '').trim();
            let vb = (b.cells[col] || '').trim();
            // Empty values sort last
            if (va === '' && vb === '') return 0;
            if (va === '') return 1;
            if (vb === '') return -1;

            let cmp;
            if (isNumeric) {
                cmp = Number(va) - Number(vb);
            } else {
                const sens = S.caseSensitiveSort ? 'variant' : 'base';
                cmp = va.localeCompare(vb, undefined, { sensitivity: sens });
            }
            return asc ? cmp : -cmp;
        });
    }

    // ===== FILTERING =====
    function onFilterChange(col, value, inputEl) {
        if (value.trim()) {
            S.filters[col] = value;
            inputEl.classList.add('active');
        } else {
            delete S.filters[col];
            inputEl.classList.remove('active');
        }
        renderBody();
        updateStatus();
    }

    function clearAllFilters() {
        S.filters = {};
        // Reset all filter inputs and dropdowns in the DOM
        const filterRow = grid.querySelector('thead tr.filter-row');
        if (filterRow) {
            for (const input of filterRow.querySelectorAll('input.filter-input')) {
                input.value = '';
                input.classList.remove('active');
            }
            for (const sel of filterRow.querySelectorAll('select.filter-select')) {
                sel.value = '';
                sel.classList.remove('active');
            }
        }
        renderBody();
        updateStatus();
        setAction('Filters cleared');
    }

    function toggleCaseSensitiveSort() {
        S.caseSensitiveSort = !S.caseSensitiveSort;
        btnCaseSort.classList.toggle('primary', S.caseSensitiveSort);
        btnCaseSort.textContent = S.caseSensitiveSort ? 'Aa\u2260a Sort' : 'Aa Sort';
        btnCaseSort.title = S.caseSensitiveSort
            ? 'Sorting is case-sensitive — click to switch to case-insensitive'
            : 'Sorting is case-insensitive — click to switch to case-sensitive';
        if (S.sortCol >= 0) {
            sortRows();
            renderGrid();
        }
        setAction('Sort: ' + (S.caseSensitiveSort ? 'case-sensitive' : 'case-insensitive'));
    }

    function rowMatchesFilters(row) {
        // Check if row is hidden by tree collapse
        if (S.treeSorted && _isCollapsedChild(row.id)) return false;

        for (const colStr in S.filters) {
            // Handle virtual tree column filter
            if (colStr === 'tree') {
                const tf = S.filters['tree'];
                if (tf === 'root') {
                    if (!S.treeChildren[row.id] || S.treeChildren[row.id].length === 0) return false;
                } else if (tf === 'child') {
                    if (S.treeParent[row.id] === undefined) return false;
                } else if (tf === 'none') {
                    if (S.treeParent[row.id] !== undefined || (S.treeChildren[row.id] && S.treeChildren[row.id].length > 0)) return false;
                }
                continue;
            }

            const col = parseInt(colStr);
            const filter = S.filters[col].trim();
            const cellVal = (row.cells[col] || '').trim();

            if (!matchFilter(cellVal, filter)) return false;
        }
        return true;
    }

    // Check if a row is hidden because an ancestor is collapsed
    function _isCollapsedChild(rowId) {
        let id = S.treeParent[rowId];
        while (id !== undefined) {
            if (S.collapsedTrees.has(id)) return true;
            id = S.treeParent[id];
        }
        return false;
    }

    function matchFilter(cellVal, filter) {
        if (!filter) return true;
        const fl = filter.toLowerCase();

        // Special: =blank / =empty → matches empty cells
        if (fl === '=blank' || fl === '=empty') return cellVal === '';
        // Special: !blank / !empty → matches non-empty cells
        if (fl === '!blank' || fl === '!empty') return cellVal !== '';

        const lower = cellVal.toLowerCase();

        // Negation
        if (filter.startsWith('!')) {
            const term = filter.slice(1).toLowerCase();
            return !lower.includes(term);
        }
        // Numeric comparisons: >N, <N, >=N, <=N, =N, ==N
        const numMatch = filter.match(/^([><=!]=?)\s*(-?\d+\.?\d*)$/);
        if (numMatch) {
            const op = numMatch[1];
            const num = parseFloat(numMatch[2]);
            const cv = parseFloat(cellVal);
            if (isNaN(cv)) return false;
            if (op === '>' ) return cv > num;
            if (op === '<' ) return cv < num;
            if (op === '>=' ) return cv >= num;
            if (op === '<=' ) return cv <= num;
            if (op === '=' || op === '==') return cv === num;
            if (op === '!=' ) return cv !== num;
        }
        // Plain number → exact numeric match
        if (/^-?\d+\.?\d*$/.test(filter.trim())) {
            const cv = parseFloat(cellVal);
            if (!isNaN(cv)) return cv === parseFloat(filter.trim());
        }
        // OR matching (pipe-separated)
        if (filter.includes('|')) {
            const terms = filter.split('|').map(t => t.trim().toLowerCase()).filter(Boolean);
            return terms.some(t => lower.includes(t));
        }
        // Default: substring match
        return lower.includes(filter.toLowerCase());
    }

    function getVisibleRows() {
        const source = S.treeSorted && S.hasTree ? _getTreeDfsOrder() : S.rows;
        return source.filter(r => rowMatchesFilters(r));
    }

    // ===== SELECTION =====
    function onRowCheckbox(rowId, checked, event) {
        const row = S.rows.find(r => r.id === rowId);
        if (!row) return;

        const visible = getVisibleRows();
        const visIdx = visible.findIndex(r => r.id === rowId);

        if (event.shiftKey && S.lastShiftIdx >= 0) {
            // Range select
            const start = Math.min(S.lastShiftIdx, visIdx);
            const end = Math.max(S.lastShiftIdx, visIdx);
            for (let i = start; i <= end; i++) {
                visible[i].selected = true;
            }
        } else {
            row.selected = checked;
        }

        S.lastShiftIdx = visIdx;
        renderBody();
        updateToolbarButtons();
        updateStatus();
    }

    function toggleSelectAll(checked) {
        const visible = getVisibleRows();
        for (const r of visible) r.selected = checked;
        renderBody();
        updateToolbarButtons();
        updateStatus();
    }

    function getSelectedRows() {
        return S.rows.filter(r => r.selected);
    }

    function deselectAll() {
        for (const r of S.rows) r.selected = false;
        renderBody();
        updateToolbarButtons();
        updateStatus();
    }

    // ===== CELL EDITING =====
    function _adjacentDisplayCol(col, forward) {
        const idx = S.displayOrder.indexOf(col);
        const next = forward ? idx + 1 : idx - 1;
        return (next >= 0 && next < S.displayOrder.length) ? S.displayOrder[next] : -1;
    }

    function startEdit(rowId, col) {
        if (col === S.tinyidCountCol) return; // read-only computed column
        commitEdit(); // commit any existing edit

        const row = S.rows.find(r => r.id === rowId);
        if (!row) return;

        S.editingCell = { rowId, col };
        const tr = tbody.querySelector(`tr[data-row-id="${rowId}"]`);
        if (!tr) return;

        const td = tr.querySelector(`td[data-col="${col}"]`);
        if (!td) return;

        const value = row.cells[col] || '';
        td.classList.add('editing');
        td.innerHTML = '';

        // Decision column: use <select> dropdown
        if (col === S.decisionCol && S.decisionCol >= 0) {
            const select = document.createElement('select');
            const options = ['', 'strip', 'skip', 'modify', 'substitute', 'followup'];
            for (const opt of options) {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt || '(none)';
                if (opt === value.trim().toLowerCase()) o.selected = true;
                select.appendChild(o);
            }

            select.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    cancelEdit();
                    e.preventDefault();
                } else if (e.key === 'Enter') {
                    commitEdit();
                    e.preventDefault();
                } else if (e.key === 'Tab') {
                    commitEdit();
                    const nextCol = _adjacentDisplayCol(col, !e.shiftKey);
                    if (nextCol >= 0) startEdit(rowId, nextCol);
                    e.preventDefault();
                }
            });

            select.addEventListener('change', () => {
                commitEdit();
            });

            select.addEventListener('blur', () => {
                setTimeout(() => {
                    if (S.editingCell && S.editingCell.rowId === rowId && S.editingCell.col === col) {
                        commitEdit();
                    }
                }, 150);
            });

            td.appendChild(select);
            select.focus();
            return;
        }

        // Use textarea for tinyId columns or long values
        const useTa = S.tinyIdCols.includes(col) || value.length > 100;
        const input = document.createElement(useTa ? 'textarea' : 'input');
        if (!useTa) input.type = 'text';
        input.value = value;

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cancelEdit();
                e.preventDefault();
            } else if (e.key === 'Enter' && !useTa) {
                commitEdit();
                e.preventDefault();
            } else if (e.key === 'Tab') {
                commitEdit();
                const nextCol = _adjacentDisplayCol(col, !e.shiftKey);
                if (nextCol >= 0) startEdit(rowId, nextCol);
                e.preventDefault();
            }
        });

        input.addEventListener('blur', () => {
            // Delay to allow button clicks to fire first
            setTimeout(() => {
                if (S.editingCell && S.editingCell.rowId === rowId && S.editingCell.col === col) {
                    commitEdit();
                }
            }, 150);
        });

        td.appendChild(input);
        input.focus();
        input.select();
    }

    function commitEdit() {
        if (!S.editingCell) return;
        const { rowId, col } = S.editingCell;
        const row = S.rows.find(r => r.id === rowId);
        if (!row) { S.editingCell = null; return; }

        const tr = tbody.querySelector(`tr[data-row-id="${rowId}"]`);
        if (!tr) { S.editingCell = null; return; }

        const td = tr.querySelector(`td[data-col="${col}"]`);
        if (!td) { S.editingCell = null; return; }
        const input = td.querySelector('input, textarea, select');
        if (!input) { S.editingCell = null; return; }

        const newValue = input.value;
        const oldValue = row.cells[col] || '';

        if (newValue !== oldValue) {
            pushUndo('Edit cell');
            row.cells[col] = newValue;
        }

        S.editingCell = null;
        renderBody(); // re-render to restore normal cell display
        updateStatus();
    }

    function cancelEdit() {
        S.editingCell = null;
        renderBody();
    }

    // ===== ROW OPERATIONS =====
    function addRow() {
        pushUndo('Add row');
        const cells = S.headers.map(() => '');
        const selectedRows = getSelectedRows();
        const newRow = { id: S.nextId++, cells, selected: false };

        if (selectedRows.length > 0) {
            // Insert after last selected
            const lastSel = selectedRows[selectedRows.length - 1];
            const idx = S.rows.indexOf(lastSel);
            S.rows.splice(idx + 1, 0, newRow);
        } else {
            S.rows.push(newRow);
        }

        renderBody();
        updateStatus();
        setAction('Added row');
    }

    function duplicateRow() {
        const sel = getSelectedRows();
        if (sel.length === 0) return;
        pushUndo('Duplicate ' + sel.length + ' row(s)');
        let inserted = 0;
        for (let i = sel.length - 1; i >= 0; i--) {
            const src = sel[i];
            const idx = S.rows.indexOf(src);
            const newRow = { id: S.nextId++, cells: [...src.cells], selected: false };
            S.rows.splice(idx + 1, 0, newRow);
            inserted++;
        }
        renderBody();
        updateStatus();
        setAction('Duplicated ' + inserted + ' row(s)');
    }

    function deleteSelectedRows() {
        const sel = getSelectedRows();
        if (sel.length === 0) return;
        pushUndo('Delete ' + sel.length + ' row(s)');
        const ids = new Set(sel.map(r => r.id));
        S.rows = S.rows.filter(r => !ids.has(r.id));
        renderBody();
        updateToolbarButtons();
        updateStatus();
        setAction('Deleted ' + sel.length + ' row(s)');
    }

    function moveSelectedRows(direction) {
        const sel = getSelectedRows();
        if (sel.length === 0) return;

        pushUndo('Move rows ' + (direction > 0 ? 'down' : 'up'));

        const selIds = new Set(sel.map(r => r.id));
        if (direction < 0) {
            // Move up
            for (let i = 1; i < S.rows.length; i++) {
                if (selIds.has(S.rows[i].id) && !selIds.has(S.rows[i - 1].id)) {
                    [S.rows[i - 1], S.rows[i]] = [S.rows[i], S.rows[i - 1]];
                }
            }
        } else {
            // Move down
            for (let i = S.rows.length - 2; i >= 0; i--) {
                if (selIds.has(S.rows[i].id) && !selIds.has(S.rows[i + 1].id)) {
                    [S.rows[i], S.rows[i + 1]] = [S.rows[i + 1], S.rows[i]];
                }
            }
        }

        renderBody();
        setAction('Moved ' + sel.length + ' row(s)');
    }

    // ===== DRAG-DROP REORDER =====
    let dragRowId = null;

    function onDragStart(e, rowId) {
        dragRowId = rowId;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', rowId);
        e.target.style.opacity = '0.5';
    }

    function onDragOver(e, tr) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        tr.classList.remove('drag-over-top', 'drag-over-bottom');
        const rect = tr.getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) {
            tr.classList.add('drag-over-top');
        } else {
            tr.classList.add('drag-over-bottom');
        }
    }

    function onDrop(e, targetRowId, tr) {
        e.preventDefault();
        tr.classList.remove('drag-over-top', 'drag-over-bottom');

        if (dragRowId === null || dragRowId === targetRowId) return;

        pushUndo('Reorder row');

        const srcIdx = S.rows.findIndex(r => r.id === dragRowId);
        const dstIdx = S.rows.findIndex(r => r.id === targetRowId);
        if (srcIdx < 0 || dstIdx < 0) return;

        const [moved] = S.rows.splice(srcIdx, 1);

        // Determine insert position based on drop position
        const rect = tr.getBoundingClientRect();
        const insertBefore = e.clientY < rect.top + rect.height / 2;
        let newIdx = S.rows.findIndex(r => r.id === targetRowId);
        if (!insertBefore) newIdx++;
        S.rows.splice(newIdx, 0, moved);

        renderBody();
        setAction('Reordered row');
    }

    function clearDragIndicators() {
        dragRowId = null;
        for (const tr of tbody.querySelectorAll('tr')) {
            tr.style.opacity = '';
            tr.classList.remove('drag-over-top', 'drag-over-bottom');
        }
    }

    // ===== BULK CATEGORIZE =====
    function showCategorizeModal() {
        const sel = getSelectedRows();
        if (sel.length === 0) return;

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        // Remember last used column
        const lastCol = localStorage.getItem('tsv_editor_cat_col') || '';
        const lastVal = localStorage.getItem('tsv_editor_cat_val') || '';

        overlay.innerHTML = `
            <div class="modal">
                <div class="modal-header">Categorize ${sel.length} Row(s)</div>
                <div class="modal-body">
                    <label>Target Column</label>
                    <select id="cat-col">
                        ${S.headers.map((h, i) =>
                            `<option value="${i}" ${h === lastCol || (lastCol === '' && h === 'field_profile') ? 'selected' : ''}>${h}</option>`
                        ).join('')}
                    </select>
                    <label>Value</label>
                    <input type="text" id="cat-val" value="${lastVal}" placeholder="Enter category value...">
                    <div class="preview-list">${sel.map(r => r.cells[0] || '(empty)').join('\n')}</div>
                </div>
                <div class="modal-footer">
                    <button class="tb-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="tb-btn primary" id="cat-apply">Apply</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);

        const catVal = overlay.querySelector('#cat-val');
        catVal.focus();
        catVal.select();

        overlay.querySelector('#cat-apply').addEventListener('click', () => {
            const col = parseInt(overlay.querySelector('#cat-col').value);
            const val = catVal.value;

            pushUndo('Categorize ' + sel.length + ' rows');

            for (const r of sel) {
                r.cells[col] = val;
            }

            localStorage.setItem('tsv_editor_cat_col', S.headers[col]);
            localStorage.setItem('tsv_editor_cat_val', val);

            overlay.remove();
            renderBody();
            setAction('Categorized ' + sel.length + ' row(s) as "' + val + '"');
        });

        // Enter key applies
        catVal.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') overlay.querySelector('#cat-apply').click();
            if (e.key === 'Escape') overlay.remove();
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });
    }

    // ===== MERGE ROWS =====
    function showMergeModal() {
        const sel = getSelectedRows();
        if (sel.length < 2) return;

        // Find pattern column
        const patCol = S.headers.findIndex(h => h.toLowerCase() === 'pattern');
        const tidCol = S.tinyIdCols[0] !== undefined ? S.tinyIdCols[0] : -1;

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        // Preview patterns
        const patterns = sel.map(r => r.cells[patCol >= 0 ? patCol : 0] || '(empty)');

        // Compute merged tinyIds
        let mergedTids = '';
        if (tidCol >= 0) {
            const allIds = new Set();
            for (const r of sel) {
                const val = r.cells[tidCol] || '';
                for (const id of val.split(/[\s|]+/)) {
                    if (id) allIds.add(id);
                }
            }
            mergedTids = Array.from(allIds).sort().join('|');
        }

        // Default: keep longest pattern
        const longestIdx = patterns.reduce((best, p, i) => p.length > patterns[best].length ? i : best, 0);

        overlay.innerHTML = `
            <div class="modal">
                <div class="modal-header">Merge ${sel.length} Rows</div>
                <div class="modal-body">
                    <label>Patterns to merge</label>
                    <div class="preview-list">${patterns.map((p, i) =>
                        `<label style="display:block;cursor:pointer"><input type="radio" name="keep-pat" value="${i}" ${i === longestIdx ? 'checked' : ''}> ${p}</label>`
                    ).join('\n')}</div>
                    ${tidCol >= 0 ? `
                        <label>Merged tinyIds (${mergedTids.split('|').length} unique)</label>
                        <div class="preview-list" style="font-size:10px;word-break:break-all">${mergedTids}</div>
                    ` : ''}
                </div>
                <div class="modal-footer">
                    <button class="tb-btn" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="tb-btn primary" id="merge-apply">Merge</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);

        overlay.querySelector('#merge-apply').addEventListener('click', () => {
            const keepIdx = parseInt(overlay.querySelector('input[name="keep-pat"]:checked').value);

            pushUndo('Merge ' + sel.length + ' rows');

            // Build merged row from the chosen pattern's row
            const mergedRow = { id: S.nextId++, cells: [...sel[keepIdx].cells], selected: false };
            if (tidCol >= 0) {
                mergedRow.cells[tidCol] = mergedTids;
            }

            // Replace first selected row, remove the rest
            const firstIdx = S.rows.indexOf(sel[0]);
            const selIds = new Set(sel.map(r => r.id));
            S.rows = S.rows.filter(r => !selIds.has(r.id));
            S.rows.splice(firstIdx, 0, mergedRow);

            overlay.remove();
            renderBody();
            updateToolbarButtons();
            updateStatus();
            setAction('Merged ' + sel.length + ' rows');
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });
    }

    // ===== SPLIT BY FIELD =====
    function splitByField() {
        if (S.fpCol < 0) {
            alert('No field_profile column found in this TSV.');
            return;
        }

        const groups = {};
        const visible = getVisibleRows();
        for (const r of visible) {
            const fp = (r.cells[S.fpCol] || 'unspecified').trim();
            if (!groups[fp]) groups[fp] = [];
            groups[fp].push(r);
        }

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        const groupItems = Object.entries(groups).map(([fp, rows]) =>
            `<div style="display:flex;justify-content:space-between;padding:4px 0">
                <span><strong>${fp}</strong> (${rows.length} rows)</span>
                <button class="tb-btn" data-fp="${fp}" style="font-size:11px">Download</button>
            </div>`
        ).join('');

        overlay.innerHTML = `
            <div class="modal">
                <div class="modal-header">Split by field_profile</div>
                <div class="modal-body">
                    <p style="margin-bottom:12px;color:var(--text-muted)">Download each group as a separate TSV file.</p>
                    ${groupItems}
                </div>
                <div class="modal-footer">
                    <button class="tb-btn" onclick="this.closest('.modal-overlay').remove()">Close</button>
                    <button class="tb-btn primary" id="split-all">Download All</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);

        // Individual download buttons
        for (const btn of overlay.querySelectorAll('button[data-fp]')) {
            btn.addEventListener('click', () => {
                const fp = btn.dataset.fp;
                const rows = groups[fp];
                downloadTSV(S.headers, rows.map(r => r.cells), splitFileName(fp));
                btn.textContent = 'Done';
                btn.disabled = true;
            });
        }

        // Download all
        overlay.querySelector('#split-all').addEventListener('click', () => {
            for (const [fp, rows] of Object.entries(groups)) {
                downloadTSV(S.headers, rows.map(r => r.cells), splitFileName(fp));
            }
            overlay.remove();
            setAction('Downloaded ' + Object.keys(groups).length + ' split files');
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.remove();
        });
    }

    function splitFileName(fp) {
        const base = S.fileName.replace(/\.\w+$/, '');
        return base + '_' + fp.replace(/[^a-zA-Z0-9_-]/g, '_') + '.tsv';
    }

    // ===== DECISION QUICK-ASSIGN =====
    function setDecisionForSelected(decision) {
        if (S.decisionCol < 0) return;
        const sel = getSelectedRows();
        if (sel.length === 0) return;

        pushUndo('Set ' + sel.length + ' rows to "' + decision + '"');

        for (const r of sel) {
            r.cells[S.decisionCol] = decision;
        }

        renderBody();
        updateToolbarButtons();
        updateStatus();
        setAction('Set ' + sel.length + ' row(s) to \'' + decision + '\'');
    }

    // ===== GROUP MANAGEMENT =====
    function _hasAnyGroups() {
        if (S.notesCol < 0) return false;
        const groupRe = /\bG\d+\b/;
        return S.rows.some(r => groupRe.test(r.cells[S.notesCol] || ''));
    }

    function assignGroup() {
        if (S.notesCol < 0) return;
        const sel = getSelectedRows();
        if (sel.length < 2) return;

        const groupNum = S.nextGroupNum;
        const tag = 'G' + groupNum;

        pushUndo('Assign group ' + tag);

        for (const r of sel) {
            const existing = (r.cells[S.notesCol] || '').trim();
            r.cells[S.notesCol] = existing ? existing + ' ' + tag : tag;
        }

        S.nextGroupNum = groupNum + 1;

        renderBody();
        updateToolbarButtons();
        updateStatus();
        setAction('Assigned ' + tag + ' to ' + sel.length + ' rows');
    }

    function propagateGroups() {
        if (S.notesCol < 0 || S.decisionCol < 0 || S.modificationCol < 0) {
            alert('Propagation requires decision, modification, and notes columns.');
            return;
        }

        // Helper: extract group numbers from a row's notes cell
        function rowGroupNums(row) {
            const notes = row.cells[S.notesCol] || '';
            const nums = new Set();
            const re = /\bG(\d+)\b/g;
            let m;
            while ((m = re.exec(notes)) !== null) nums.add(parseInt(m[1], 10));
            return nums;
        }

        // Scan ALL rows for group membership (need full groups even if only
        // some members are selected)
        const groupMembers = {};
        for (const row of S.rows) {
            for (const num of rowGroupNums(row)) {
                if (!groupMembers[num]) groupMembers[num] = [];
                groupMembers[num].push(row);
            }
        }

        // Scope: if rows are selected, restrict to groups with selected members
        const selected = getSelectedRows();
        let scopedGroupNums;

        if (selected.length > 0) {
            // Collect group numbers from selected rows
            const selGroupNums = new Set();
            let nonGroupSelected = 0;
            for (const row of selected) {
                const nums = rowGroupNums(row);
                if (nums.size === 0) {
                    nonGroupSelected++;
                } else {
                    for (const n of nums) selGroupNums.add(n);
                }
            }

            if (selGroupNums.size === 0) {
                setAction('Selected rows are not in any group');
                return;
            }

            if (nonGroupSelected > 0) {
                alert(nonGroupSelected + ' selected row(s) are not in any group and will be ignored.');
            }

            scopedGroupNums = selGroupNums;
        } else {
            // No selection — use all groups
            scopedGroupNums = new Set(Object.keys(groupMembers).map(Number));
        }

        // For each scoped group, find the source row (decision + modification text)
        const propagations = [];
        for (const num of scopedGroupNums) {
            const members = groupMembers[num];
            if (!members || members.length < 2) continue;

            const sourceRow = members.find(r => {
                const dec = (r.cells[S.decisionCol] || '').trim().toLowerCase();
                const mod = (r.cells[S.modificationCol] || '').trim();
                return (dec === 'modify' || dec === 'substitute') && mod !== '';
            });

            if (sourceRow) {
                const targets = members.filter(r => r !== sourceRow);
                propagations.push({ groupNum: num, sourceRow, targetRows: targets });
            }
        }

        if (propagations.length === 0) {
            setAction('No groups with modifications to propagate');
            return;
        }

        const totalGroups = propagations.length;
        const totalRows = propagations.reduce((s, p) => s + p.targetRows.length, 0);

        // Extra warning when multiple groups would be affected
        if (totalGroups > 1) {
            const groupList = propagations.map(p => 'G' + p.groupNum).join(', ');
            if (!confirm('Multiple groups selected: ' + groupList + '\n\n' +
                         'Propagate all ' + totalGroups + ' groups (' + totalRows + ' target rows)?\n\n' +
                         'To propagate a single group, select only its members first.')) {
                return;
            }
        } else {
            if (!confirm('Propagate G' + propagations[0].groupNum +
                         ' (' + totalRows + ' target row' + (totalRows !== 1 ? 's' : '') + ')?\n\n' +
                         'This will copy the decision and modification text\n' +
                         'from the source row to all other rows in the group.')) {
                return;
            }
        }

        pushUndo('Propagate ' + totalGroups + ' group(s)');

        for (const { sourceRow, targetRows } of propagations) {
            const srcDecision = sourceRow.cells[S.decisionCol];
            const modText = sourceRow.cells[S.modificationCol];
            for (const target of targetRows) {
                target.cells[S.decisionCol] = srcDecision;
                target.cells[S.modificationCol] = modText;
            }
        }

        renderBody();
        updateToolbarButtons();
        updateStatus();
        setAction('Propagated to ' + totalRows + ' row(s) in ' + totalGroups + ' group(s)');
    }

    // ===== CONTAINMENT TREE OPS =====
    function toggleTreeSort() {
        if (!S.hasTree) return;
        S.treeSorted = !S.treeSorted;
        if (S.treeSorted) {
            // Disable column sort when tree sort is active
            S.sortCol = -1;
        }
        btnTreeSort.classList.toggle('primary', S.treeSorted);
        renderGrid();
        updateStatus();
        setAction(S.treeSorted ? 'Tree sort ON \u2014 children grouped under parents' : 'Tree sort OFF');
    }

    function propagateTree() {
        if (!S.hasTree || S.decisionCol < 0) {
            alert('Tree propagation requires a containment tree and a decision column.');
            return;
        }

        // Collect parents to propagate from:
        // If rows are selected, use selected rows that are parents (have children)
        // Otherwise, use all parents with decisions
        const selected = getSelectedRows();
        let parents;
        if (selected.length > 0) {
            parents = selected.filter(r => (S.treeChildren[r.id] || []).length > 0);
            if (parents.length === 0) {
                setAction('No selected rows are tree parents');
                return;
            }
        } else {
            parents = S.rows.filter(r =>
                (S.treeChildren[r.id] || []).length > 0 &&
                (r.cells[S.decisionCol] || '').trim() !== ''
            );
        }

        if (parents.length === 0) {
            setAction('No parents with decisions to propagate');
            return;
        }

        // Collect all descendants that would be affected
        function allDescendants(id) {
            const result = [];
            for (const cid of (S.treeChildren[id] || [])) {
                result.push(cid);
                result.push(...allDescendants(cid));
            }
            return result;
        }

        let totalTargets = 0;
        const propagations = [];
        for (const parent of parents) {
            const dec = (parent.cells[S.decisionCol] || '').trim();
            if (!dec) continue;
            const descIds = allDescendants(parent.id);
            if (descIds.length === 0) continue;
            propagations.push({ parent, descIds, decision: dec });
            totalTargets += descIds.length;
        }

        if (propagations.length === 0) {
            setAction('No parents with decisions to propagate');
            return;
        }

        const msg = 'Propagate decision from ' + propagations.length + ' parent(s) to ' +
                     totalTargets + ' contained descendant(s)?\n\n' +
                     propagations.slice(0, 5).map(p => {
                         const patCol = S.headers.findIndex(h => h.toLowerCase() === 'pattern');
                         const pat = (p.parent.cells[patCol] || '').slice(0, 40);
                         return '  ' + p.decision + ' \u2192 ' + pat + ' (' + p.descIds.length + ' children)';
                     }).join('\n') +
                     (propagations.length > 5 ? '\n  ... and ' + (propagations.length - 5) + ' more' : '');
        if (!confirm(msg)) return;

        pushUndo('Tree propagate ' + propagations.length + ' parent(s)');

        for (const { parent, descIds, decision } of propagations) {
            for (const cid of descIds) {
                const childRow = S.rows.find(r => r.id === cid);
                if (childRow) {
                    childRow.cells[S.decisionCol] = decision;
                    // Also copy modification if present and parent has one
                    if (S.modificationCol >= 0) {
                        const mod = (parent.cells[S.modificationCol] || '').trim();
                        if (mod) childRow.cells[S.modificationCol] = mod;
                    }
                }
            }
        }

        renderBody();
        updateToolbarButtons();
        updateStatus();
        setAction('Propagated to ' + totalTargets + ' descendant(s) from ' + propagations.length + ' parent(s)');
    }

    // ===== UNDO / REDO =====
    function pushUndo(description) {
        S.undoStack.push({
            description,
            snapshot: JSON.parse(JSON.stringify(S.rows.map(r => ({ cells: r.cells, selected: r.selected })))),
            headers: [...S.headers],
        });
        if (S.undoStack.length > 50) S.undoStack.shift();
        S.redoStack = [];
        updateToolbarButtons();
    }

    function undo() {
        if (S.undoStack.length === 0) return;
        const entry = S.undoStack.pop();

        // Save current state for redo
        S.redoStack.push({
            description: 'Redo',
            snapshot: JSON.parse(JSON.stringify(S.rows.map(r => ({ cells: r.cells, selected: r.selected })))),
            headers: [...S.headers],
        });

        // Restore
        S.headers = entry.headers;
        S.rows = entry.snapshot.map(s => ({
            id: S.nextId++,
            cells: s.cells,
            selected: s.selected,
        }));
        detectColumns();

        renderGrid();
        updateToolbarButtons();
        updateStatus();
        setAction('Undo: ' + entry.description);
    }

    function redo() {
        if (S.redoStack.length === 0) return;
        const entry = S.redoStack.pop();

        // Save current for undo
        S.undoStack.push({
            description: 'Undo redo',
            snapshot: JSON.parse(JSON.stringify(S.rows.map(r => ({ cells: r.cells, selected: r.selected })))),
            headers: [...S.headers],
        });

        S.headers = entry.headers;
        S.rows = entry.snapshot.map(s => ({
            id: S.nextId++,
            cells: s.cells,
            selected: s.selected,
        }));
        detectColumns();

        renderGrid();
        updateToolbarButtons();
        updateStatus();
        setAction('Redo');
    }

    // ===== FILE I/O =====
    function downloadTSV(headers, cellRows, filename) {
        const content = TSV.serialize(headers, cellRows);
        const blob = new Blob([content], { type: 'text/tab-separated-values;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename || S.fileName || 'patterns.tsv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setAction('Downloaded ' + (filename || S.fileName));
    }

    async function saveAsDialog() {
        const content = TSV.serialize(S.headers, S.rows.map(r => r.cells));
        // Use File System Access API for a real Save As dialog (Chrome/Edge)
        if (window.showSaveFilePicker) {
            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: S.fileName || 'patterns.tsv',
                    types: [{
                        description: 'TSV files',
                        accept: { 'text/tab-separated-values': ['.tsv'] }
                    }]
                });
                const writable = await handle.createWritable();
                await writable.write(content);
                await writable.close();
                S.dirty = false;
                setAction('Saved as ' + handle.name);
                updateStatus();
                return;
            } catch (e) {
                if (e.name === 'AbortError') return; // User cancelled
                // Fall through to blob download
            }
        }
        // Fallback: blob download to browser Downloads folder
        downloadTSV(S.headers, S.rows.map(r => r.cells), S.fileName);
    }

    async function saveToServer() {
        if (!S.serverMode) {
            saveAsDialog();
            return;
        }

        const content = TSV.serialize(S.headers, S.rows.map(r => r.cells));
        try {
            const resp = await fetch(cdeUrl('/save'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content }),
            });
            const data = await resp.json();
            if (data.status === 'ok') {
                S.originalContent = content;
                const now = new Date();
                setAction('Saved at ' + now.toLocaleTimeString());
            } else {
                setAction('Save failed: ' + (data.message || 'unknown error'));
            }
        } catch (e) {
            setAction('Save error: ' + e.message);
        }
    }

    function openFile() {
        fileInput.click();
    }

    function handleFileLoad(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            loadData(e.target.result, file.name);
            setAction('Loaded ' + file.name);
        };
        reader.readAsText(file);
    }

    // ===== STATUS =====
    function updateStatus() {
        const total = S.rows.length;
        const selected = getSelectedRows().length;
        const visible = getVisibleRows().length;
        const hidden = total - visible;

        let text = S.fileName + ' \u2014 ' + total + ' rows';
        if (selected > 0) text += ' (' + selected + ' selected)';
        if (hidden > 0) text += ' (' + hidden + ' hidden by filter)';

        // Decision column stats + tinyId count summary
        if (S.decisionCol >= 0) {
            let strip = 0, skip = 0, modify = 0, substitute = 0, followup = 0, empty = 0;
            let tidTotal = 0, tidDecided = 0;
            const hasTidCount = S.tinyidCountCol >= 0;
            for (const r of S.rows) {
                const d = (r.cells[S.decisionCol] || '').trim().toLowerCase();
                const tc = hasTidCount ? parseInt(r.cells[S.tinyidCountCol], 10) || 0 : 0;
                tidTotal += tc;
                if (d === 'strip') { strip++; tidDecided += tc; }
                else if (d === 'skip') { skip++; tidDecided += tc; }
                else if (d === 'modify') { modify++; tidDecided += tc; }
                else if (d === 'substitute') { substitute++; tidDecided += tc; }
                else if (d === 'followup') { followup++; }
                else empty++;
            }
            text += ' | \u2713' + strip + ' \u2717' + skip + ' \u270E' + modify;
            if (substitute > 0) text += ' \u21C4' + substitute;
            if (followup > 0) text += ' \u2691' + followup;
            if (empty > 0) text += ' ?' + empty;
            if (hasTidCount && tidTotal > 0) {
                text += ' | tinyIds: ' + tidDecided.toLocaleString() + '/' + tidTotal.toLocaleString();
            }
        }

        // Tree stats
        if (S.hasTree) {
            const roots = S.rows.filter(r => S.treeParent[r.id] === undefined && (S.treeChildren[r.id] || []).length > 0).length;
            const children = S.rows.filter(r => S.treeParent[r.id] !== undefined).length;
            text += ' | \u2283' + roots + ' trees, ' + children + ' contained';
        }

        statusLeft.textContent = text;

        const dot = S.serverMode ? 'server' : 'standalone';
        statusMode.innerHTML = `<span class="mode-dot ${dot}"></span>${S.serverMode ? 'Server' : 'Standalone'}`;
    }

    function setAction(text) {
        statusAction.textContent = text;
        // Auto-clear after 5s
        setTimeout(() => {
            if (statusAction.textContent === text) statusAction.textContent = '';
        }, 5000);
    }

    function updateToolbarButtons() {
        const sel = getSelectedRows().length;
        btnDelete.disabled = sel === 0;
        btnDupRow.disabled = sel === 0;
        btnMoveUp.disabled = sel === 0;
        btnMoveDown.disabled = sel === 0;
        btnCategorize.disabled = sel === 0;
        btnMerge.disabled = sel < 2;
        btnUndo.disabled = S.undoStack.length === 0;
        btnRedo.disabled = S.redoStack.length === 0;

        // Show/hide save button based on mode
        btnSave.style.display = S.serverMode ? '' : 'none';

        // Decision quick-buttons: show only when decision column exists
        if (S.decisionCol >= 0) {
            decisionButtons.style.display = 'flex';
            btnDqStrip.disabled = sel === 0;
            btnDqSkip.disabled = sel === 0;
            btnDqModify.disabled = sel === 0;
            btnDqSubstitute.disabled = sel === 0;
            btnDqFollowup.disabled = sel === 0;
        } else {
            decisionButtons.style.display = 'none';
        }

        // Group buttons: show only when notes column exists
        if (S.notesCol >= 0) {
            groupButtons.style.display = 'flex';
            btnGroup.disabled = sel < 2;
            btnPropagate.disabled = !_hasAnyGroups();
        } else {
            groupButtons.style.display = 'none';
        }

        // Tree buttons: show only when containment tree exists
        if (S.hasTree) {
            treeButtons.style.display = 'flex';
            btnTreeSort.classList.toggle('primary', S.treeSorted);
        } else {
            treeButtons.style.display = 'none';
        }
    }

    function hasUnsavedChanges() {
        const current = TSV.serialize(S.headers, S.rows.map(r => r.cells));
        return current !== S.originalContent;
    }

    // ===== KEYBOARD SHORTCUTS =====
    document.addEventListener('keydown', (e) => {
        // Don't intercept if editing a cell or modal input
        const tag = (e.target.tagName || '').toLowerCase();
        const isInput = tag === 'input' || tag === 'textarea' || tag === 'select';
        const inModal = e.target.closest('.modal-overlay');

        if (e.key === 'Escape') {
            if (S.editingCell) {
                cancelEdit();
                e.preventDefault();
            } else if (!inModal) {
                deselectAll();
            }
            return;
        }

        // Allow filter inputs to work normally except for global shortcuts
        if (isInput && !e.ctrlKey && !e.metaKey) return;

        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
            undo();
            e.preventDefault();
        } else if ((e.ctrlKey || e.metaKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey) || e.key === 'y')) {
            redo();
            e.preventDefault();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            saveToServer();
            e.preventDefault();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'a' && !isInput) {
            toggleSelectAll(true);
            e.preventDefault();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
            deselectAll();
            e.preventDefault();
        } else if ((e.ctrlKey || e.metaKey) && e.key === 'd' && !isInput) {
            duplicateRow();
            e.preventDefault();
        } else if (e.key === 'Delete' && !isInput) {
            deleteSelectedRows();
            e.preventDefault();
        }

        // Tree sort toggle: T (when no selection, or always with no decision col)
        if (!isInput && !inModal && !S.editingCell && !e.ctrlKey && !e.metaKey && !e.altKey) {
            if ((e.key === 't' || e.key === 'T') && S.hasTree && getSelectedRows().length === 0) {
                toggleTreeSort();
                e.preventDefault();
                return;
            }
        }

        // Decision shortcuts: S=strip, K=skip, M=modify, U=substitute, F=followup
        if (!isInput && !inModal && !S.editingCell && !e.ctrlKey && !e.metaKey && !e.altKey) {
            if (S.decisionCol >= 0 && getSelectedRows().length > 0) {
                if (e.key === 's' || e.key === 'S') {
                    setDecisionForSelected('strip');
                    e.preventDefault();
                } else if (e.key === 'k' || e.key === 'K') {
                    setDecisionForSelected('skip');
                    e.preventDefault();
                } else if (e.key === 'm' || e.key === 'M') {
                    setDecisionForSelected('modify');
                    e.preventDefault();
                } else if (e.key === 'u' || e.key === 'U') {
                    setDecisionForSelected('substitute');
                    e.preventDefault();
                } else if (e.key === 'f' || e.key === 'F') {
                    setDecisionForSelected('followup');
                    e.preventDefault();
                }
            }
        }

        if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
            if (e.shiftKey) {
                // Ctrl+Shift+F: clear all filters
                clearAllFilters();
                e.preventDefault();
            } else {
                // Ctrl+F: focus first filter input or select
                const firstFilter = thead.querySelector('.filter-input, .filter-select');
                if (firstFilter) {
                    firstFilter.focus();
                    e.preventDefault();
                }
            }
        }
    });

    // ===== CHANGE DETECTION =====
    window.addEventListener('beforeunload', (e) => {
        if (S.rows.length > 0 && hasUnsavedChanges()) {
            e.preventDefault();
            e.returnValue = '';
        }
    });

    // ===== BUTTON EVENT HANDLERS =====
    btnSave.addEventListener('click', saveToServer);
    btnSaveAs.addEventListener('click', saveAsDialog);
    btnOpen.addEventListener('click', openFile);
    btnAddRow.addEventListener('click', addRow);
    btnDupRow.addEventListener('click', duplicateRow);
    btnDelete.addEventListener('click', deleteSelectedRows);
    btnMoveUp.addEventListener('click', () => moveSelectedRows(-1));
    btnMoveDown.addEventListener('click', () => moveSelectedRows(1));
    btnCategorize.addEventListener('click', showCategorizeModal);
    btnMerge.addEventListener('click', showMergeModal);
    btnSplit.addEventListener('click', splitByField);
    btnUndo.addEventListener('click', undo);
    btnRedo.addEventListener('click', redo);

    // Decision + Group button handlers
    btnDqStrip.addEventListener('click', () => setDecisionForSelected('strip'));
    btnDqSkip.addEventListener('click', () => setDecisionForSelected('skip'));
    btnDqModify.addEventListener('click', () => setDecisionForSelected('modify'));
    btnDqSubstitute.addEventListener('click', () => setDecisionForSelected('substitute'));
    btnDqFollowup.addEventListener('click', () => setDecisionForSelected('followup'));
    btnGroup.addEventListener('click', assignGroup);
    btnPropagate.addEventListener('click', propagateGroups);
    btnTreeSort.addEventListener('click', toggleTreeSort);
    btnTreePropagate.addEventListener('click', propagateTree);
    btnClearFilters.addEventListener('click', clearAllFilters);
    btnCaseSort.addEventListener('click', toggleCaseSensitiveSort);

    // File input handler
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFileLoad(e.target.files[0]);
        }
    });

    // ===== DROP ZONE HANDLERS =====
    dropArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropArea.classList.add('dragover');
    });
    dropArea.addEventListener('dragleave', () => {
        dropArea.classList.remove('dragover');
    });
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            handleFileLoad(e.dataTransfer.files[0]);
        }
    });

    // Also handle drops on the grid container (for re-loading)
    gridContainer.addEventListener('dragover', (e) => {
        // Only handle file drops, not row reorder
        if (e.dataTransfer.types.includes('Files')) {
            e.preventDefault();
        }
    });
    gridContainer.addEventListener('drop', (e) => {
        if (e.dataTransfer.types.includes('Files') && e.dataTransfer.files.length > 0) {
            e.preventDefault();
            if (hasUnsavedChanges()) {
                if (!confirm('You have unsaved changes. Load new file?')) return;
            }
            handleFileLoad(e.dataTransfer.files[0]);
        }
    });

    // ===== INIT =====
    async function init() {
        // Try server mode
        try {
            const infoResp = await fetch(cdeUrl('/info'));
            const info = await infoResp.json();
            if (info.server_mode) {
                S.serverMode = true;
                S.filePath = info.path;
                S.fileName = info.filename;

                /* Centralized mode: show curator bar and start countdown */
                if (window.__CDE_CENTRALIZED__ && window.__CDE_CURATOR__) {
                    const bar = document.getElementById('curator-bar');
                    const nameEl = document.getElementById('curator-name');
                    const countEl = document.getElementById('expiry-countdown');
                    if (bar && nameEl) {
                        nameEl.textContent = 'Curator: ' + window.__CDE_CURATOR__;
                        bar.style.display = 'block';
                        if (window.__CDE_EXPIRES__ && countEl) {
                            function updateCountdown() {
                                const remaining = window.__CDE_EXPIRES__ - Math.floor(Date.now() / 1000);
                                if (remaining <= 0) {
                                    countEl.textContent = 'Session expired';
                                    countEl.style.color = '#c53030';
                                } else {
                                    const h = Math.floor(remaining / 3600);
                                    const m = Math.floor((remaining % 3600) / 60);
                                    countEl.textContent = 'Expires in ' + h + 'h ' + m + 'm';
                                }
                            }
                            updateCountdown();
                            setInterval(updateCountdown, 30000);
                        }
                    }
                }

                const dataResp = await fetch(cdeUrl('/data'));
                const data = await dataResp.json();
                if (data.content) {
                    loadData(data.content, data.filename);
                    setAction('Loaded from server');
                    return;
                }
            }
        } catch (e) {
            // Standalone mode
        }

        // Standalone: show drop zone
        S.serverMode = false;
        dropZone.style.display = 'flex';
    }

    init();
})();
</script>
