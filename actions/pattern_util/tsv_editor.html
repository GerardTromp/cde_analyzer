<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSV Pattern Editor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #ffffff;
    --bg-alt: #f8f9fa;
    --bg-selected: #e3f2fd;
    --bg-hover: #f0f4f8;
    --border: #dee2e6;
    --border-light: #e9ecef;
    --text: #212529;
    --text-muted: #6c757d;
    --primary: #1976d2;
    --primary-light: #bbdefb;
    --danger: #d32f2f;
    --danger-light: #ffcdd2;
    --success: #388e3c;
    --success-light: #c8e6c9;
    --warning: #f57c00;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    --toolbar-h: 42px;
    --filter-h: 30px;
    --status-h: 28px;
    --profile-def: #1565c0;
    --profile-desig: #e65100;
    --profile-both: #2e7d32;
    --profile-mixed: #6a1b9a;
}

body {
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
}

/* ===== TOOLBAR ===== */
#toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 4px 8px;
    background: var(--bg-alt);
    border-bottom: 1px solid var(--border);
    height: var(--toolbar-h);
    flex-shrink: 0;
}

#toolbar .sep {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 6px;
}

.tb-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.1s;
}
.tb-btn:hover { background: var(--bg-hover); }
.tb-btn:active { background: var(--border-light); }
.tb-btn:disabled { opacity: 0.4; cursor: default; }
.tb-btn.danger { color: var(--danger); }
.tb-btn.danger:hover { background: var(--danger-light); }
.tb-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.tb-btn.primary:hover { background: #1565c0; }

#toolbar .title {
    font-weight: 600;
    font-size: 14px;
    margin-right: 8px;
    color: var(--primary);
}

#toolbar .spacer { flex: 1; }

/* ===== DROP ZONE ===== */
#drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
}

#drop-zone .drop-area {
    width: 500px;
    height: 300px;
    border: 3px dashed var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: border-color 0.2s, background 0.2s;
}

#drop-zone .drop-area.dragover {
    border-color: var(--primary);
    background: var(--primary-light);
}

#drop-zone .drop-icon { font-size: 48px; color: var(--text-muted); }
#drop-zone .drop-text { font-size: 18px; color: var(--text-muted); }
#drop-zone .drop-hint { font-size: 13px; color: var(--text-muted); }

#drop-zone .file-btn {
    padding: 8px 24px;
    border: 1px solid var(--primary);
    border-radius: 6px;
    background: var(--bg);
    color: var(--primary);
    font-size: 14px;
    cursor: pointer;
}
#drop-zone .file-btn:hover { background: var(--primary-light); }

#file-input { display: none; }

/* ===== GRID CONTAINER ===== */
#grid-container {
    flex: 1;
    overflow: auto;
    position: relative;
}

/* ===== TABLE ===== */
#grid {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
    font-size: 12px;
}

#grid th, #grid td {
    border: 1px solid var(--border-light);
    padding: 3px 6px;
    text-align: left;
    vertical-align: top;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 400px;
}

/* Header row */
#grid thead tr:first-child th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg-alt);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid var(--border);
    padding: 5px 6px;
}

#grid thead tr:first-child th:hover { background: #e2e6ea; }

.sort-arrow { margin-left: 4px; font-size: 10px; color: var(--text-muted); }

/* Filter row */
#grid thead tr.filter-row th {
    position: sticky;
    top: 29px;
    z-index: 9;
    background: #f5f5f5;
    padding: 2px 3px;
    border-bottom: 2px solid var(--border);
}

.filter-input {
    width: 100%;
    padding: 2px 4px;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    font-size: 11px;
    font-family: var(--font);
    outline: none;
}
.filter-input:focus { border-color: var(--primary); }
.filter-input.active { background: #fff3e0; border-color: var(--warning); }

.filter-select {
    width: 100%;
    padding: 2px 4px;
    border: 1px solid var(--border-light);
    border-radius: 3px;
    font-size: 11px;
    font-family: var(--font);
    outline: none;
    background: #fff;
    cursor: pointer;
}
.filter-select:focus { border-color: var(--primary); }
.filter-select.active { background: #fff3e0; border-color: var(--warning); }

/* Checkbox column — enlarged click target covers the whole cell */
.col-check { width: 30px; max-width: 30px; text-align: center !important; cursor: pointer; user-select: none; }
.col-check input[type="checkbox"] { cursor: pointer; pointer-events: none; }

/* Row number column */
.col-rownum { width: 36px; max-width: 36px; text-align: right !important; color: var(--text-muted); font-size: 11px; }

/* Row styling */
#grid tbody tr { transition: background 0.05s; }
#grid tbody tr:hover { background: var(--bg-hover); }
#grid tbody tr.selected { background: var(--bg-selected); }
#grid tbody tr.hidden { display: none; }

/* Field profile color coding */
#grid tbody tr.fp-def-only { border-left: 3px solid var(--profile-def); }
#grid tbody tr.fp-desig-only { border-left: 3px solid var(--profile-desig); }
#grid tbody tr.fp-both-all { border-left: 3px solid var(--profile-both); }
#grid tbody tr.fp-both { border-left: 3px solid var(--profile-both); }
#grid tbody tr.fp-mixed { border-left: 3px solid var(--profile-mixed); }

/* ===== DECISION BADGES ===== */
.decision-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    line-height: 16px;
}
.decision-strip { background: var(--success-light); color: var(--success); }
.decision-skip { background: var(--danger-light); color: var(--danger); }
.decision-modify { background: #fff3e0; color: var(--warning); }
.decision-substitute { background: #e0f7fa; color: #00838f; }
.decision-followup { background: #f3e5f5; color: #7b1fa2; }

/* Decision quick-buttons in toolbar */
.decision-quick-btn {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.1s;
}
.decision-quick-btn:disabled { opacity: 0.3; cursor: default; }
.decision-quick-btn.dq-strip { background: var(--success-light); color: var(--success); border-color: var(--success); }
.decision-quick-btn.dq-strip:hover:not(:disabled) { background: #a5d6a7; }
.decision-quick-btn.dq-skip { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
.decision-quick-btn.dq-skip:hover:not(:disabled) { background: #ef9a9a; }
.decision-quick-btn.dq-modify { background: #fff3e0; color: var(--warning); border-color: var(--warning); }
.decision-quick-btn.dq-modify:hover:not(:disabled) { background: #ffe0b2; }
.decision-quick-btn.dq-substitute { background: #e0f7fa; color: #00838f; border-color: #00838f; }
.decision-quick-btn.dq-substitute:hover:not(:disabled) { background: #b2ebf2; }
.decision-quick-btn.dq-followup { background: #f3e5f5; color: #7b1fa2; border-color: #7b1fa2; }
.decision-quick-btn.dq-followup:hover:not(:disabled) { background: #e1bee7; }

/* Decision select dropdown during edit */
#grid td.editing select {
    width: 100%;
    min-width: 100px;
    padding: 3px 5px;
    border: 2px solid var(--primary);
    border-radius: 0;
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    background: #fff;
}

/* ===== GROUP INDICATORS (right border, 8 rotating hues) ===== */
.group-border-1 { border-right: 3px solid #e91e63 !important; }
.group-border-2 { border-right: 3px solid #9c27b0 !important; }
.group-border-3 { border-right: 3px solid #2196f3 !important; }
.group-border-4 { border-right: 3px solid #009688 !important; }
.group-border-5 { border-right: 3px solid #ff9800 !important; }
.group-border-6 { border-right: 3px solid #795548 !important; }
.group-border-7 { border-right: 3px solid #607d8b !important; }
.group-border-8 { border-right: 3px solid #cddc39 !important; }

.group-badge {
    display: inline-block;
    padding: 0 5px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    margin-left: 4px;
    line-height: 16px;
}
.group-badge-1 { background: #fce4ec; color: #e91e63; }
.group-badge-2 { background: #f3e5f5; color: #9c27b0; }
.group-badge-3 { background: #e3f2fd; color: #2196f3; }
.group-badge-4 { background: #e0f2f1; color: #009688; }
.group-badge-5 { background: #fff3e0; color: #ff9800; }
.group-badge-6 { background: #efebe9; color: #795548; }
.group-badge-7 { background: #eceff1; color: #607d8b; }
.group-badge-8 { background: #f9fbe7; color: #cddc39; }

/* Editing cell */
#grid td.editing {
    padding: 0;
    overflow: visible;
}

#grid td.editing input,
#grid td.editing textarea {
    width: 100%;
    min-width: 200px;
    padding: 3px 5px;
    border: 2px solid var(--primary);
    border-radius: 0;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    background: #fff;
}

#grid td.editing textarea {
    min-height: 60px;
    resize: vertical;
}

/* Column width overrides — narrower decision + tinyid_count to make room for tree */
.col-decision { max-width: 72px; }
.col-tinyid-count { max-width: 52px; }

/* ===== CONTAINMENT TREE COLUMN ===== */
.col-tree { white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
.tree-toggle {
    cursor: pointer; user-select: none; display: inline-block;
    font-size: 10px; margin-right: 2px; color: var(--text-muted);
}
.tree-toggle:hover { color: var(--primary); }
.tree-desc-count {
    display: inline-block;
    background: #ede7f6; color: #5e35b1;
    padding: 0 5px; border-radius: 8px;
    font-size: 10px; font-weight: 600;
}
.tree-child-ref {
    color: #78909c; font-size: 10px;
}
.tree-depth-dot { color: #b0bec5; margin-right: 1px; }

/* tinyId cells */
.tinyid-cell { cursor: pointer; }

.tinyid-collapsed .tid-count {
    display: inline-block;
    background: var(--primary-light);
    color: var(--primary);
    padding: 0 5px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 600;
    margin-right: 4px;
}

.tinyid-collapsed .tid-preview { color: var(--text-muted); font-size: 11px; }

.tinyid-expanded {
    white-space: normal !important;
    max-width: 600px !important;
}

.tinyid-expanded .tid-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
}

.tid-pill {
    display: inline-block;
    background: var(--bg-alt);
    border: 1px solid var(--border-light);
    padding: 0 4px;
    border-radius: 3px;
    font-family: var(--mono);
    font-size: 10px;
    line-height: 18px;
}

/* ===== STATUS BAR ===== */
#status-bar {
    display: flex;
    align-items: center;
    padding: 2px 12px;
    background: var(--bg-alt);
    border-top: 1px solid var(--border);
    height: var(--status-h);
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-muted);
    gap: 8px;
}

#status-bar .spacer { flex: 1; }

#status-left { display: flex; gap: 12px; }
#status-action { color: var(--success); }

.mode-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.mode-dot.server { background: var(--success); }
.mode-dot.standalone { background: var(--text-muted); }

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
}

.modal {
    background: var(--bg);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    min-width: 420px;
    max-width: 700px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
}

.modal-header {
    padding: 12px 16px;
    font-weight: 600;
    font-size: 15px;
    border-bottom: 1px solid var(--border);
}

.modal-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
}

.modal-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
}

.modal label {
    display: block;
    margin-bottom: 4px;
    font-weight: 500;
    font-size: 12px;
    color: var(--text-muted);
}

.modal select, .modal input[type="text"] {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 13px;
    margin-bottom: 12px;
}

.modal .preview-list {
    max-height: 200px;
    overflow-y: auto;
    background: var(--bg-alt);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 8px;
    margin-bottom: 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
}

/* ===== DRAG-DROP ROW REORDER ===== */
#grid tbody tr[draggable="true"] .col-rownum { cursor: grab; }
#grid tbody tr.drag-over-top { border-top: 2px solid var(--primary); }
#grid tbody tr.drag-over-bottom { border-bottom: 2px solid var(--primary); }

/* ===== SCROLLBAR ===== */
#grid-container::-webkit-scrollbar { width: 10px; height: 10px; }
#grid-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
#grid-container::-webkit-scrollbar-track { background: var(--bg-alt); }
</style>
<script>
/* Centralized mode URL prefix — injected by server via window.__CDE_TOKEN__ */
function cdeUrl(path) {
    if (window.__CDE_CENTRALIZED__ && window.__CDE_TOKEN__) {
        return '/c/' + window.__CDE_TOKEN__ + path;
    }
    return path;
}
</script>
</head>
<body>

<!-- Drop Zone (shown when no data loaded) -->
<div id="drop-zone">
    <div class="drop-area" id="drop-area">
        <div class="drop-icon">&#128196;</div>
        <div class="drop-text">Drop a TSV file here</div>
        <div class="drop-hint">or</div>
        <button class="file-btn" onclick="document.getElementById('file-input').click()">Choose File</button>
        <div class="drop-hint">.tsv, .txt, .tab</div>
    </div>
    <input type="file" id="file-input" accept=".tsv,.txt,.tab,.csv">
</div>

<!-- Toolbar -->
<div id="toolbar" style="display:none">
    <span class="title">TSV Editor</span>
    <div class="sep"></div>

    <!-- File ops -->
    <button class="tb-btn" id="btn-open" title="Open file (drag-drop or pick)">&#128194; Open</button>
    <button class="tb-btn" id="btn-save" title="Save to server (Ctrl+S)">&#128190; Save</button>
    <button class="tb-btn primary" id="btn-save-as" title="Download as new file (Save As)">&#128190; Save As</button>
    <div class="sep"></div>

    <!-- Row ops -->
    <button class="tb-btn" id="btn-add-row" title="Add empty row">+ Row</button>
    <button class="tb-btn" id="btn-dup-row" title="Duplicate selected row (Ctrl+D)" disabled>&#8892; Dup</button>
    <button class="tb-btn danger" id="btn-delete" title="Delete selected rows (Del)" disabled>&#10005; Delete</button>
    <button class="tb-btn" id="btn-move-up" title="Move selected rows up" disabled>&#9650;</button>
    <button class="tb-btn" id="btn-move-down" title="Move selected rows down" disabled>&#9660;</button>
    <div class="sep"></div>

    <!-- Bulk ops -->
    <button class="tb-btn" id="btn-categorize" title="Categorize selected rows" disabled>&#9998; Categorize</button>
    <button class="tb-btn" id="btn-merge" title="Merge selected rows" disabled>&#8726; Merge</button>
    <button class="tb-btn" id="btn-split" title="Split by field_profile">&#8700; Split</button>
    <div class="sep"></div>

    <!-- Decision quick-assign (hidden when no decision column) -->
    <div id="decision-buttons" style="display:none; align-items:center; gap:2px;">
        <div class="sep"></div>
        <button class="decision-quick-btn dq-strip" id="btn-dq-strip" title="Set selected to 'strip' (S)" disabled>&#10003; Strip</button>
        <button class="decision-quick-btn dq-skip" id="btn-dq-skip" title="Set selected to 'skip' (K)" disabled>&#10007; Skip</button>
        <button class="decision-quick-btn dq-modify" id="btn-dq-modify" title="Set selected to 'modify' (M)" disabled>&#10038; Modify</button>
        <button class="decision-quick-btn dq-substitute" id="btn-dq-substitute" title="Set selected to 'substitute' (U)" disabled>&#8644; Subst</button>
        <button class="decision-quick-btn dq-followup" id="btn-dq-followup" title="Set selected to 'followup' (F)" disabled>&#9873; Follow</button>
    </div>

    <!-- Group ops (hidden when no notes column) -->
    <div id="group-buttons" style="display:none; align-items:center; gap:2px;">
        <div class="sep"></div>
        <button class="tb-btn" id="btn-group" title="Assign merge group to selected rows" disabled>&#9744; Group</button>
        <button class="tb-btn" id="btn-propagate" title="Propagate modifications within groups">&#8644; Propagate</button>
    </div>

    <!-- Tree ops (hidden when no containment tree) -->
    <div id="tree-buttons" style="display:none; align-items:center; gap:2px;">
        <div class="sep"></div>
        <button class="tb-btn" id="btn-tree-sort" title="Toggle tree sort — group children under parents (T)">&#9776; Tree</button>
        <button class="tb-btn" id="btn-tree-propagate" title="Propagate decision from parent to all contained children">&#8674; &#8835; Propagate</button>
    </div>
    <div class="sep"></div>

    <!-- Undo/redo -->
    <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)" disabled>&#8630; Undo</button>
    <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Shift+Z)" disabled>&#8631; Redo</button>

    <div class="sep"></div>
    <button class="tb-btn" id="btn-clear-filters" title="Clear all column filters (Ctrl+Shift+F)">&#10005; Filters</button>
    <button class="tb-btn" id="btn-case-sort" title="Toggle case-sensitive sorting (for tree-adjacent use)">Aa Sort</button>

    <span class="spacer"></span>

    <span id="toolbar-info" style="font-size:11px; color:var(--text-muted)"></span>
</div>

<!-- Centralized curation info bar (shown only in centralized mode) -->
<div id="curator-bar" style="display:none; background:#ebf8ff; padding:6px 16px; font-size:13px; border-bottom:1px solid #bee3f8; color:#2b6cb0;">
    <strong id="curator-name"></strong>
    <span style="margin-left:1.5rem" id="expiry-countdown"></span>
</div>

<!-- Grid -->
<div id="grid-container" style="display:none">
    <table id="grid">
        <thead></thead>
        <tbody></tbody>
    </table>
</div>

<!-- Status Bar -->
<div id="status-bar" style="display:none">
    <div id="status-left"></div>
    <span class="spacer"></span>
    <span id="status-action"></span>
    <span class="spacer"></span>
    <span id="status-mode"></span>
</div>

<script>
(function() {
    'use strict';

    // ===== STATE =====
    const S = {
        headers: [],
        rows: [],          // [{id, cells:[], selected:bool}]
        originalContent: '',
        sortCol: -1,
        sortAsc: true,
        filters: {},
        serverMode: false,
        filePath: '',
        fileName: '',
        undoStack: [],
        redoStack: [],
        editingCell: null,
        nextId: 0,
        lastShiftIdx: -1,
        fpCol: -1,         // field_profile column index
        tinyIdCols: [],     // indices of tinyId columns
        expandedTids: new Set(), // row IDs with expanded tinyIds
        decisionCol: -1,    // 'decision' column index
        modificationCol: -1, // 'modification' column index
        notesCol: -1,        // 'notes' column index
        nextGroupNum: 1,     // next available merge group number
        displayOrder: [],    // column indices in display order (decision first when present)
        // Containment tree state
        treeParent: {},      // rowId -> parent rowId
        treeChildren: {},    // rowId -> [child rowIds]
        treeDepth: {},       // rowId -> depth (0 for roots)
        treeDescCount: {},   // rowId -> total descendant count
        hasTree: false,      // whether containment tree exists
        collapsedTrees: new Set(), // rowIds of collapsed tree nodes
        treeSorted: false,   // whether tree sort is active
        caseSensitiveSort: false, // whether column sort is case-sensitive
    };

    // ===== DOM REFS =====
    const $ = id => document.getElementById(id);
    const dropZone = $('drop-zone');
    const dropArea = $('drop-area');
    const fileInput = $('file-input');
    const toolbar = $('toolbar');
    const gridContainer = $('grid-container');
    const grid = $('grid');
    const thead = grid.querySelector('thead');
    const tbody = grid.querySelector('tbody');
    const statusBar = $('status-bar');
    const statusLeft = $('status-left');
    const statusAction = $('status-action');
    const statusMode = $('status-mode');

    // ===== TSV PARSER =====
    const TSV = {
        parse(text) {
            const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
            // Remove trailing empty lines
            while (lines.length > 0 && lines[lines.length - 1].trim() === '') lines.pop();
            if (lines.length === 0) return { headers: [], rows: [] };

            const headers = lines[0].split('\t');
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                const cells = lines[i].split('\t');
                // Pad to header count
                while (cells.length < headers.length) cells.push('');
                rows.push(cells);
            }
            return { headers, rows };
        },

        serialize(headers, rows) {
            const lines = [headers.join('\t')];
            for (const cells of rows) {
                lines.push(cells.join('\t'));
            }
            return lines.join('\n') + '\n';
        }
    };

    // ===== DETECT SPECIAL COLUMNS =====
    function detectColumns() {
        S.fpCol = -1;
        S.tinyIdCols = [];
        S.tinyidCountCol = -1;
        S.decisionCol = -1;
        S.modificationCol = -1;
        S.notesCol = -1;
        S.groupCol = -1;
        for (let i = 0; i < S.headers.length; i++) {
            const h = S.headers[i].toLowerCase();
            if (h === 'field_profile') S.fpCol = i;
            if (h === 'tinyid_count') S.tinyidCountCol = i;
            else if ((h.includes('tinyid') || h.includes('tinyids')) && !h.endsWith('_count')) S.tinyIdCols.push(i);
            if (h === 'decision') S.decisionCol = i;
            if (h === 'modification') S.modificationCol = i;
            if (h === 'notes') S.notesCol = i;
            if (h === 'group') S.groupCol = i;
        }
        // Scan existing notes for group numbers to initialize nextGroupNum
        S.nextGroupNum = 1;
        if (S.notesCol >= 0) {
            for (const row of S.rows) {
                const notes = row.cells[S.notesCol] || '';
                const re = /\bG(\d+)\b/g;
                let m;
                while ((m = re.exec(notes)) !== null) {
                    const num = parseInt(m[1], 10);
                    if (num >= S.nextGroupNum) S.nextGroupNum = num + 1;
                }
            }
        }

        // Compute display order: move curation columns to front
        // Order: decision, tinyid_count, group (if present), modification, then rest
        S.displayOrder = [];
        const frontCols = new Set();
        if (S.decisionCol >= 0) { S.displayOrder.push(S.decisionCol); frontCols.add(S.decisionCol); }
        if (S.tinyidCountCol >= 0) { S.displayOrder.push(S.tinyidCountCol); frontCols.add(S.tinyidCountCol); }
        if (S.groupCol >= 0) { S.displayOrder.push(S.groupCol); frontCols.add(S.groupCol); }
        if (S.modificationCol >= 0) { S.displayOrder.push(S.modificationCol); frontCols.add(S.modificationCol); }
        for (let i = 0; i < S.headers.length; i++) {
            if (!frontCols.has(i)) S.displayOrder.push(i);
        }
    }

    // ===== INJECT TINYID COUNT =====
    function _normalizeLegacyDecisions() {
        // Backwards compat: map old "keep"→"strip", "remove"→"skip" in decision column
        const dIdx = S.headers.findIndex(h => h.toLowerCase() === 'decision');
        if (dIdx < 0) return;
        const compat = { 'keep': 'strip', 'remove': 'skip' };
        for (const r of S.rows) {
            const v = (r.cells[dIdx] || '').trim().toLowerCase();
            if (compat[v]) r.cells[dIdx] = compat[v];
        }
    }

    function _injectTinyidCount() {
        const tcIdx = S.headers.findIndex(h => h.toLowerCase() === 'tinyid_count');
        if (tcIdx >= 0) return; // already present
        const tidIdx = S.headers.findIndex(h => {
            const lc = h.toLowerCase();
            return lc === 'tinyids' || lc === 'tinyid';
        });
        if (tidIdx < 0) return; // no tinyIds column
        const insertAt = tidIdx + 1;
        S.headers.splice(insertAt, 0, 'tinyid_count');
        for (const row of S.rows) {
            const tids = (row.cells[tidIdx] || '').split(/[\s|]+/).filter(Boolean);
            row.cells.splice(insertAt, 0, String(tids.length));
        }
    }

    // ===== BUILD CONTAINMENT TREE =====
    // Discovers prefix-containment relationships: if pattern A is a text prefix
    // of pattern B AND A's tinyIds fully contain B's tinyIds, then B is a child of A.
    function _buildContainmentTree() {
        S.treeParent = {};
        S.treeChildren = {};
        S.treeDepth = {};
        S.treeDescCount = {};
        S.hasTree = false;
        S.collapsedTrees = new Set();
        S.treeSorted = false;

        _treePatCol = S.headers.findIndex(h => h.toLowerCase() === 'pattern');
        if (_treePatCol < 0 || S.tinyIdCols.length === 0) return;
        const patternCol = _treePatCol;
        const tidCol = S.tinyIdCols[0];

        // Parse tinyIds for all rows; index by exact pattern text
        const rowTids = new Map();       // rowId -> Set of tinyIds
        const patternToRow = new Map();  // pattern string -> row (first match)
        for (const row of S.rows) {
            const pat = (row.cells[patternCol] || '').trim();
            const tids = new Set((row.cells[tidCol] || '').split(/[\s|]+/).filter(Boolean));
            rowTids.set(row.id, tids);
            if (pat && !patternToRow.has(pat)) patternToRow.set(pat, row);
        }

        // For each row, try word-level prefixes (longest first) to find immediate parent
        for (const row of S.rows) {
            const pat = (row.cells[patternCol] || '').trim();
            const words = pat.split(' ');
            if (words.length < 2) continue; // single-word patterns can't have parents

            const childTids = rowTids.get(row.id);
            if (childTids.size === 0) continue;

            for (let w = words.length - 1; w >= 1; w--) {
                const prefix = words.slice(0, w).join(' ');
                const parentRow = patternToRow.get(prefix);
                if (!parentRow || parentRow.id === row.id) continue;

                const parentTids = rowTids.get(parentRow.id);
                // Quick reject: child can't be subset of smaller set
                if (childTids.size > parentTids.size) continue;

                // Check containment: childTids ⊆ parentTids
                let contained = true;
                for (const tid of childTids) {
                    if (!parentTids.has(tid)) { contained = false; break; }
                }

                if (contained) {
                    S.treeParent[row.id] = parentRow.id;
                    if (!S.treeChildren[parentRow.id]) S.treeChildren[parentRow.id] = [];
                    S.treeChildren[parentRow.id].push(row.id);
                    S.hasTree = true;
                    break; // found immediate parent (longest matching prefix)
                }
            }
        }

        // Compute depths (iterative to avoid stack overflow on deep trees)
        for (const row of S.rows) {
            let depth = 0, id = row.id;
            while (S.treeParent[id] !== undefined) { depth++; id = S.treeParent[id]; }
            S.treeDepth[row.id] = depth;
        }

        // Compute descendant counts (bottom-up)
        function countDesc(id) {
            const children = S.treeChildren[id] || [];
            let count = children.length;
            for (const cid of children) count += countDesc(cid);
            return count;
        }
        for (const row of S.rows) {
            S.treeDescCount[row.id] = countDesc(row.id);
        }
    }

    // Get tree-sorted row order (DFS: parent → children sorted by tinyid_count desc)
    function _getTreeDfsOrder() {
        // Build row lookup map for O(1) access
        const rowById = new Map();
        for (const row of S.rows) rowById.set(row.id, row);

        // Separate roots (with children) and singletons (no tree relationship)
        const rootsWithChildren = [];
        const singletons = [];
        for (const row of S.rows) {
            if (S.treeParent[row.id] !== undefined) continue; // skip children
            if ((S.treeChildren[row.id] || []).length > 0) {
                rootsWithChildren.push(row);
            } else {
                singletons.push(row);
            }
        }

        // Sort roots by tinyid_count descending
        const tcCol = S.tinyidCountCol;
        const byTidCount = (a, b) => {
            const ca = tcCol >= 0 ? (parseInt(a.cells[tcCol], 10) || 0) : 0;
            const cb = tcCol >= 0 ? (parseInt(b.cells[tcCol], 10) || 0) : 0;
            return cb - ca;
        };
        rootsWithChildren.sort(byTidCount);

        // DFS traversal
        const ordered = [];
        function dfs(rowId) {
            const row = rowById.get(rowId);
            if (!row) return;
            ordered.push(row);
            if (!S.collapsedTrees.has(rowId)) {
                const children = (S.treeChildren[rowId] || [])
                    .map(cid => rowById.get(cid))
                    .filter(Boolean);
                children.sort(byTidCount);
                for (const child of children) dfs(child.id);
            }
        }

        for (const root of rootsWithChildren) dfs(root.id);
        // Append singletons after tree groups
        for (const s of singletons) ordered.push(s);

        return ordered;
    }

    // ===== LOAD DATA =====
    function loadData(text, filename) {
        const parsed = TSV.parse(text);
        S.headers = parsed.headers;
        S.rows = parsed.rows.map(cells => ({
            id: S.nextId++,
            cells: cells,
            selected: false,
        }));
        S.originalContent = text;
        S.fileName = filename || 'untitled.tsv';
        S.sortCol = -1;
        S.sortAsc = true;
        S.filters = {};
        S.undoStack = [];
        S.redoStack = [];
        S.editingCell = null;
        S.expandedTids = new Set();

        // Inject tinyid_count column if missing (backward compat with older TSVs)
        _injectTinyidCount();

        // Normalize legacy decision values (keep→strip, remove→skip)
        _normalizeLegacyDecisions();

        detectColumns();
        _buildContainmentTree();

        // Insert tree into display order after tinyid_count (position 3)
        if (S.hasTree) {
            const tcIdx = S.displayOrder.indexOf(S.tinyidCountCol);
            if (tcIdx >= 0) {
                S.displayOrder.splice(tcIdx + 1, 0, 'tree');
            } else {
                S.displayOrder.splice(0, 0, 'tree');
            }
        }

        dropZone.style.display = 'none';
        toolbar.style.display = 'flex';
        gridContainer.style.display = 'block';
        statusBar.style.display = 'flex';

        renderGrid();
        updateStatus();
        updateToolbarButtons();
        document.title = S.fileName + ' - TSV Editor';
    }

    // ===== RENDER GRID =====
    function renderGrid() {
        renderHeader();
        renderBody();
    }

    function renderHeader() {
        thead.innerHTML = '';

        // Header row

        cbAll.type = 'checkbox';

            e.stopPropagation();
