# Supplementary Instrument Patterns
#
# Patterns for instruments that don't match the standard Title Case regex.
# The main InstrumentExtractor requires 60%+ Title Case words and 3+ words,
# which misses many valid instruments with non-standard naming.
#
# Loading priority (later extends earlier):
#   1. This file: config/supplementary_patterns.yaml (global, in project)
#   2. Local override: ./supplementary_patterns.yaml (in working directory)
#
# Local files extend (add to) this list rather than replacing it.
# This allows rapid iteration during curation without modifying installed code.
#
# Format:
#   - pattern: "text to match after anchor prefix"
#     name: "Canonical instrument name"
#     acronym: "ACRONYM"  # optional
#
# Anchors are automatically prepended: "as part of", "based on", "field of"
# with optional "the " following.
#
# To add new patterns:
#   1. Find the exact text in CDE definitions (case matters for matching)
#   2. Add entry to local override for rapid testing, or here for permanent addition
#   3. Re-run discovery to verify pattern is captured

# =============================================================================
# Abbreviation-only patterns with trailing context
# These are patterns like "(RFQ-U) for Pesticides" where the instrument name
# is primarily an abbreviation with descriptive suffix
# =============================================================================
abbreviation_with_context:
  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticides (Work)"
    name: "Risk Factor Questionnaire - Pesticides Work"
    acronym: "RFQ-U"

  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticide (Work)"
    name: "Risk Factor Questionnaire - Pesticide Work"
    acronym: "RFQ-U"

  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticides (Home)"
    name: "Risk Factor Questionnaire - Pesticides Home"
    acronym: "RFQ-U"

