<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1850" width="820" height="1850">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #1a1a1a; }
      .phase-title { font: bold 14px sans-serif; fill: #ffffff; }
      .step-title { font: bold 11px sans-serif; fill: #333333; }
      .step-text { font: 10px sans-serif; fill: #555555; }
      .arrow { stroke: #666666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .phase-box { stroke-width: 2; rx: 8; }
      .step-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 4; }
      .checkpoint-box { fill: #fef9c3; stroke: #eab308; stroke-width: 2; rx: 4; stroke-dasharray: 6,3; }
      .input-box { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 8; }
      .output-box { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .output-label { font: italic 10px sans-serif; fill: #2563eb; }
      .file-label { font: italic 10px sans-serif; fill: #6b7280; }
      .checkpoint-text { font: bold 10px sans-serif; fill: #92400e; }
      .detail-text { font: 10px sans-serif; fill: #666666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" class="title">Detailed Workflow Architecture</text>

  <!-- Input Box -->
  <rect x="260" y="45" width="300" height="40" class="input-box"/>
  <text x="410" y="70" text-anchor="middle" class="step-title">INPUT: cdes.json</text>

  <!-- Arrow to Phase 1 -->
  <path d="M410,85 L410,110" class="arrow"/>

  <!-- ================================================================ -->
  <!-- PHASE 1: Instrument Detection -->
  <!-- ================================================================ -->
  <rect x="40" y="110" width="740" height="1060" fill="#eff6ff" class="phase-box" style="stroke: #2563eb;"/>
  <rect x="40" y="110" width="740" height="28" fill="#2563eb" class="phase-box" style="stroke: #2563eb;"/>
  <text x="410" y="129" text-anchor="middle" class="phase-title">PHASE 1: INSTRUMENT DETECTION</text>

  <!-- Step 1: Mine instruments -->
  <rect x="70" y="150" width="500" height="36" class="step-box"/>
  <text x="85" y="168" class="step-title">1. Mine instruments</text>
  <text x="85" y="180" class="step-text">(abbreviation-only + supplementary)</text>
  <text x="590" y="173" class="file-label">instruments.tsv</text>

  <path d="M320,186 L320,198" class="arrow"/>

  <!-- Step 2: Batch expand abbreviations -->
  <rect x="70" y="198" width="500" height="36" class="step-box"/>
  <text x="85" y="216" class="step-title">2. Batch expand abbreviations</text>
  <text x="85" y="228" class="step-text">PROMIS -> "Patient-Reported Outcome..."</text>
  <text x="590" y="221" class="file-label">expanded_phrases.tsv</text>

  <path d="M320,234 L320,246" class="arrow"/>

  <!-- Step 3: Discover abbreviation patterns -->
  <rect x="70" y="246" width="500" height="36" class="step-box"/>
  <text x="85" y="264" class="step-title">3. Discover abbreviation designation patterns</text>
  <text x="85" y="276" class="step-text">(PROMIS - ..., [PROMIS])</text>
  <text x="590" y="269" class="file-label">abbrev_patterns.tsv</text>

  <path d="M320,282 L320,298" class="arrow"/>

  <!-- Checkpoint 1 -->
  <rect x="100" y="298" width="460" height="30" class="checkpoint-box"/>
  <text x="330" y="318" text-anchor="middle" class="checkpoint-text">CHECKPOINT: Expansion review</text>

  <path d="M320,328 L320,344" class="arrow"/>

  <!-- Step 4: Discover verbatim patterns -->
  <rect x="70" y="344" width="500" height="36" class="step-box"/>
  <text x="85" y="362" class="step-title">4. Discover verbatim patterns</text>
  <text x="85" y="374" class="step-text">(instruments + expanded + abbrev patterns)</text>
  <text x="590" y="365" class="file-label">discovered_instruments.tsv</text>

  <path d="M320,380 L320,392" class="arrow"/>

  <!-- Step 5: Coalesce -->
  <rect x="70" y="392" width="500" height="36" class="step-box"/>
  <text x="85" y="410" class="step-title">5. Coalesce (subsumption + prefix extraction)</text>
  <text x="590" y="413" class="file-label">coalesced_instruments.tsv</text>

  <path d="M320,428 L320,444" class="arrow"/>

  <!-- Checkpoint 2 -->
  <rect x="100" y="444" width="460" height="30" class="checkpoint-box"/>
  <text x="330" y="464" text-anchor="middle" class="checkpoint-text">CHECKPOINT: Curator review</text>
  <text x="590" y="464" class="output-label">curated_instruments.tsv</text>

  <path d="M320,474 L320,490" class="arrow"/>

  <!-- Step 6: Family discovery -->
  <rect x="70" y="490" width="500" height="28" class="step-box"/>
  <text x="85" y="508" class="step-title">6. Family discovery</text>

  <path d="M320,518 L320,530" class="arrow"/>

  <!-- Step 7: Re-discover abbreviations -->
  <rect x="70" y="530" width="500" height="28" class="step-box"/>
  <text x="85" y="548" class="step-title">7. Re-discover abbreviations</text>

  <path d="M320,558 L320,570" class="arrow"/>

  <!-- Step 8: Final discover + coalesce -->
  <rect x="70" y="570" width="500" height="36" class="step-box"/>
  <text x="85" y="588" class="step-title">8. Final discover + coalesce</text>
  <text x="85" y="600" class="step-text">(emit-def-variants, split-tiers: 3)</text>
  <text x="590" y="591" class="file-label">final_coalesced.tsv</text>

  <path d="M320,606 L320,622" class="arrow"/>

  <!-- Checkpoint 3 -->
  <rect x="100" y="622" width="460" height="30" class="checkpoint-box"/>
  <text x="330" y="642" text-anchor="middle" class="checkpoint-text">CHECKPOINT: Final review</text>

  <path d="M320,652 L320,668" class="arrow"/>

  <!-- Step 9a: Strip tier-1 -->
  <rect x="70" y="668" width="500" height="36" class="step-box"/>
  <text x="85" y="686" class="step-title">9a. Strip tier-1 (>=3 tokens)</text>
  <text x="590" y="686" class="output-label">tier1_stripped.json</text>

  <path d="M320,704 L320,716" class="arrow"/>

  <!-- Step 9b: Strip tier-2 -->
  <rect x="70" y="716" width="500" height="36" class="step-box"/>
  <text x="85" y="734" class="step-title">9b. Strip tier-2 (&lt;3 tokens)</text>
  <rect x="590" y="720" width="170" height="24" class="output-box"/>
  <text x="675" y="737" text-anchor="middle" class="step-title">no_instruments.json</text>

  <path d="M320,752 L320,764" class="arrow"/>

  <!-- Step 10: Sanity check -->
  <rect x="70" y="764" width="500" height="28" class="step-box"/>
  <text x="85" y="782" class="step-title">10. Sanity check</text>
  <rect x="590" y="768" width="170" height="20" class="output-box"/>
  <text x="675" y="782" text-anchor="middle" class="step-text">sanity_check.tsv</text>

  <path d="M320,792 L320,804" class="arrow"/>

  <!-- Step 11: Discovery report -->
  <rect x="70" y="804" width="500" height="28" class="step-box"/>
  <text x="85" y="822" class="step-title">11. Discovery report</text>
  <rect x="590" y="808" width="170" height="20" class="output-box"/>
  <text x="675" y="822" text-anchor="middle" class="step-text">discovery_report.md</text>

  <!-- Output indicator for Phase 1 -->
  <text x="770" y="695" class="detail-text" text-anchor="middle" transform="rotate(-90, 770, 695)">OUTPUTS 1-3</text>

  <!-- Arrow to Phase 2 -->
  <path d="M410,1170 L410,1200" class="arrow"/>

  <!-- ================================================================ -->
  <!-- PHASE 2: Phrase Stripping -->
  <!-- ================================================================ -->
  <rect x="40" y="1200" width="740" height="560" fill="#f0fdf4" class="phase-box" style="stroke: #16a34a;"/>
  <rect x="40" y="1200" width="740" height="28" fill="#16a34a" class="phase-box" style="stroke: #16a34a;"/>
  <text x="410" y="1219" text-anchor="middle" class="phase-title">PHASE 2: PHRASE STRIPPING</text>

  <!-- Step 1: Mine phrases -->
  <rect x="70" y="1240" width="500" height="36" class="step-box"/>
  <text x="85" y="1258" class="step-title">1. Mine phrases (k-mer descent, k=25 to k=3)</text>
  <text x="590" y="1261" class="file-label">verbatim_phrases.tsv</text>

  <path d="M320,1276 L320,1292" class="arrow"/>

  <!-- Step 2: Discover verbatim -->
  <rect x="70" y="1292" width="500" height="28" class="step-box"/>
  <text x="85" y="1310" class="step-title">2. Discover verbatim patterns</text>
  <text x="590" y="1310" class="file-label">discovered.tsv</text>

  <path d="M320,1320 L320,1336" class="arrow"/>

  <!-- Step 3: Coalesce patterns -->
  <rect x="70" y="1336" width="500" height="28" class="step-box"/>
  <text x="85" y="1354" class="step-title">3. Coalesce patterns</text>
  <text x="590" y="1354" class="file-label">coalesced.tsv</text>

  <path d="M320,1364 L320,1380" class="arrow"/>

  <!-- Step 4: Field analysis -->
  <rect x="70" y="1380" width="500" height="36" class="step-box"/>
  <text x="85" y="1398" class="step-title">4. Field analysis (enrich + filter)</text>
  <text x="590" y="1401" class="file-label">coalesced_fields.tsv</text>

  <path d="M320,1416 L320,1432" class="arrow"/>

  <!-- Checkpoint 4 -->
  <rect x="100" y="1432" width="460" height="30" class="checkpoint-box"/>
  <text x="330" y="1452" text-anchor="middle" class="checkpoint-text">CHECKPOINT: Curator review</text>
  <text x="590" y="1452" class="output-label">curated.tsv</text>

  <path d="M320,1462 L320,1478" class="arrow"/>

  <!-- Step 5: Strip phrases -->
  <rect x="70" y="1478" width="500" height="28" class="step-box"/>
  <text x="85" y="1496" class="step-title">5. Strip phrases</text>
  <rect x="590" y="1482" width="170" height="20" class="output-box"/>
  <text x="675" y="1496" text-anchor="middle" class="step-text">final_stripped.json</text>

  <path d="M320,1506 L320,1522" class="arrow"/>

  <!-- Step 6: Discovery report -->
  <rect x="70" y="1522" width="500" height="28" class="step-box"/>
  <text x="85" y="1540" class="step-title">6. Discovery report</text>
  <rect x="590" y="1526" width="170" height="20" class="output-box"/>
  <text x="675" y="1540" text-anchor="middle" class="step-text">discovery_report.md</text>

  <!-- Output indicator for Phase 2 -->
  <text x="770" y="1505" class="detail-text" text-anchor="middle" transform="rotate(-90, 770, 1505)">OUTPUTS 4-5</text>

  <!-- Arrow to Output -->
  <path d="M410,1760 L410,1790" class="arrow"/>

  <!-- Output Box -->
  <rect x="230" y="1790" width="360" height="40" class="output-box"/>
  <text x="410" y="1815" text-anchor="middle" class="step-title">OUTPUT: Cleaned CDE JSON</text>
</svg>
