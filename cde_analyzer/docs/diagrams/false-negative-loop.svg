<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="800" height="820">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #1a1a1a; }
      .subtitle { font: 12px sans-serif; fill: #6b7280; }
      .step-title { font: bold 12px sans-serif; fill: #333333; }
      .step-text { font: 11px monospace; fill: #555555; }
      .detail-text { font: 10px sans-serif; fill: #666666; }
      .arrow { stroke: #666666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .loop-arrow { stroke: #f59e0b; stroke-width: 3; fill: none; marker-end: url(#looparrow); }
      .step-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; rx: 6; }
      .human-box { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; rx: 6; stroke-dasharray: 8,4; }
      .input-box { fill: #e0e7ff; stroke: #6366f1; stroke-width: 2; rx: 8; }
      .decision-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
      .file-label { font: italic 10px sans-serif; fill: #6b7280; }
      .or-text { font: bold 12px sans-serif; fill: #9ca3af; }
      .note-text { font: italic 10px sans-serif; fill: #7c3aed; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <marker id="looparrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">False Negative Recovery Loop</text>
  <text x="400" y="50" text-anchor="middle" class="subtitle">Iterative improvement after each stripping phase</text>

  <!-- Input Box -->
  <rect x="250" y="70" width="300" height="45" class="input-box"/>
  <text x="400" y="92" text-anchor="middle" class="step-title">Stripped JSON</text>
  <text x="400" y="107" text-anchor="middle" class="file-label">inst_stripped.json or final_stripped.json</text>

  <!-- Arrow -->
  <path d="M400,115 L400,145" class="arrow"/>

  <!-- Step A: Diagnose -->
  <rect x="100" y="145" width="600" height="100" class="step-box"/>
  <text x="120" y="170" class="step-title">A. Diagnose Remaining Patterns</text>
  <text x="120" y="190" class="step-text">diagnose_strip -i stripped.json -m CDE -o remaining.tsv --suggest-patterns</text>
  <text x="400" y="210" text-anchor="middle" class="or-text">- OR -</text>
  <text x="120" y="230" class="step-text">strip_discover -i stripped.json --analyze-false-negatives -o false_neg.tsv</text>
  <text x="600" y="235" class="file-label">remaining patterns</text>

  <!-- Arrow -->
  <path d="M400,245 L400,265" class="arrow"/>

  <!-- Step A2: Search Abbreviations (NEW) -->
  <rect x="100" y="265" width="600" height="100" class="step-box"/>
  <text x="120" y="290" class="step-title">A2. Search for Known Abbreviations (instruments only)</text>
  <text x="120" y="310" class="step-text">grep -E '\[(PROMIS|Neuro-QOL|MDS-UPDRS|PHQ|GAD|...)\]' stripped.json</text>
  <text x="120" y="330" class="step-text">grep -E '(PROMIS|Neuro-QOL|...) - ' stripped.json</text>
  <text x="140" y="355" class="note-text">Catches short bracketed patterns and " - " separators missed by k-mer mining</text>

  <!-- Arrow -->
  <path d="M400,365 L400,395" class="arrow"/>

  <!-- Step B: Curator Review -->
  <rect x="100" y="395" width="600" height="85" class="human-box"/>
  <text x="120" y="420" class="step-title">B. CURATOR REVIEW (human)</text>
  <text x="140" y="440" class="detail-text">* Review false_neg.tsv patterns and grep results</text>
  <text x="140" y="455" class="detail-text">* Set 'include' column to 'yes' for valid patterns</text>
  <text x="140" y="470" class="detail-text">* Add 'name' column with canonical names</text>
  <text x="600" y="470" class="file-label">curated false neg</text>

  <!-- Arrow -->
  <path d="M400,480 L400,510" class="arrow"/>

  <!-- Step C: Import -->
  <rect x="100" y="510" width="600" height="65" class="step-box"/>
  <text x="120" y="535" class="step-title">C. Import to Config</text>
  <text x="120" y="555" class="step-text">strip_discover --add-to-supplementary curated.tsv</text>
  <text x="480" y="565" class="file-label">config/supplementary_patterns.yaml</text>

  <!-- Arrow -->
  <path d="M400,575 L400,605" class="arrow"/>

  <!-- Step D: Re-mine -->
  <rect x="100" y="605" width="600" height="65" class="step-box"/>
  <text x="120" y="630" class="step-title">D. Re-mine with New Patterns</text>
  <text x="120" y="650" class="step-text">instrument_miner -i cdes.json -o inst_output/ --extract-supplementary</text>
  <text x="600" y="660" class="file-label">updated patterns</text>

  <!-- Arrow to decision -->
  <path d="M400,670 L400,700" class="arrow"/>

  <!-- Decision diamond -->
  <polygon points="400,700 500,740 400,780 300,740" class="decision-box"/>
  <text x="400" y="735" text-anchor="middle" class="step-title">False negatives</text>
  <text x="400" y="750" text-anchor="middle" class="step-title">acceptable?</text>

  <!-- Yes arrow (down and out) -->
  <path d="M400,780 L400,810" class="arrow"/>
  <text x="415" y="800" class="detail-text">Yes</text>

  <!-- Done box -->
  <rect x="325" y="810" width="150" height="30" fill="#dcfce7" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="400" y="830" text-anchor="middle" class="step-title">Done</text>

  <!-- No arrow (loop back) -->
  <path d="M500,740 L740,740 L740,160 L700,160" class="loop-arrow"/>
  <text x="520" y="730" class="detail-text">No</text>
  <text x="750" y="450" class="detail-text" transform="rotate(90 750 450)">Repeat</text>

  <!-- Legend -->
  <rect x="50" y="760" width="200" height="70" fill="#fafafa" stroke="#e5e7eb" rx="4"/>
  <text x="70" y="778" class="step-title">Legend:</text>
  <rect x="70" y="788" width="15" height="12" class="step-box"/>
  <text x="90" y="798" class="detail-text">Automated</text>
  <rect x="70" y="808" width="15" height="12" class="human-box"/>
  <text x="90" y="818" class="detail-text">Human review</text>
  <rect x="150" y="788" width="15" height="12" class="decision-box"/>
  <text x="170" y="798" class="detail-text">Decision</text>
  <line x1="150" y1="814" x2="175" y2="814" class="loop-arrow" style="marker-end: none;"/>
  <text x="180" y="818" class="detail-text">Loop</text>
</svg>
