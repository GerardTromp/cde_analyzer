<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" width="760" height="620">
  <defs>
    <style>
      .title { font: bold 16px sans-serif; fill: #1a1a1a; }
      .step-title { font: bold 11px sans-serif; fill: #333333; }
      .step-text { font: 10px sans-serif; fill: #666666; }
      .file-label { font: 11px monospace; fill: #1e40af; }
      .file-label-dim { font: italic 10px monospace; fill: #6b7280; }
      .arrow { stroke: #666666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-branch { stroke: #94a3b8; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-loop { stroke: #dc2626; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-red); stroke-dasharray: 5,3; }
      .input-box { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; rx: 6; }
      .phase-box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 4; }
      .output-box { fill: #dbeafe; stroke: #3b82f6; stroke-width: 1.5; rx: 4; }
      .config-box { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; rx: 4; }
      .iterate-label { font: bold 10px sans-serif; fill: #dc2626; }
      .phase-label { font: bold 12px sans-serif; fill: #ffffff; }
      .phase-header { rx: 4; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666666"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="24" text-anchor="middle" class="title">Instrument &amp; Phrase Stripping — File Dependencies</text>

  <!-- Input -->
  <rect x="260" y="42" width="240" height="36" class="input-box"/>
  <text x="380" y="65" text-anchor="middle" class="step-title">cdes.json (original)</text>

  <!-- Arrow down -->
  <path d="M380,78 L380,106" class="arrow"/>

  <!-- Phase 1 -->
  <rect x="140" y="106" width="360" height="56" class="phase-box"/>
  <rect x="140" y="106" width="360" height="22" fill="#2563eb" class="phase-header"/>
  <text x="320" y="122" text-anchor="middle" class="phase-label">Phase 1 — Instrument Mining (ITERATE)</text>
  <text x="160" y="150" class="step-title">Mine + discover + coalesce + curate</text>

  <!-- Phase 1 outputs -->
  <rect x="530" y="110" width="210" height="22" class="output-box"/>
  <text x="540" y="126" class="file-label">instruments.tsv</text>
  <path d="M500,125 L530,125" class="arrow"/>
  <rect x="530" y="136" width="210" height="22" class="output-box"/>
  <text x="540" y="152" class="file-label">instruments_verbatim.tsv</text>

  <!-- Config feedback loop -->
  <rect x="10" y="116" width="110" height="36" class="config-box"/>
  <text x="20" y="132" class="file-label-dim">supplementary_</text>
  <text x="20" y="144" class="file-label-dim">patterns.yaml</text>
  <path d="M120,134 L140,134" class="arrow"/>
  <!-- Iterate loop arrow (left side) -->
  <path d="M65,152 L65,172 Q65,182 75,182 L120,182 Q130,182 130,172 L130,162" class="arrow-loop"/>
  <text x="78" y="180" class="iterate-label">ITERATE</text>

  <!-- Arrow down -->
  <path d="M380,162 L380,196" class="arrow"/>

  <!-- Phase 2 -->
  <rect x="200" y="196" width="360" height="44" class="phase-box"/>
  <rect x="200" y="196" width="360" height="22" fill="#2563eb" class="phase-header"/>
  <text x="380" y="212" text-anchor="middle" class="phase-label">Phase 2 — Strip Instruments</text>
  <text x="220" y="232" class="step-title">strip_phrases (two-pass)</text>

  <!-- Phase 2 output -->
  <rect x="590" y="200" width="160" height="36" class="output-box"/>
  <text x="600" y="216" class="file-label">cdes_no_</text>
  <text x="600" y="230" class="file-label">instruments.json</text>
  <path d="M560,220 L590,220" class="arrow"/>

  <!-- Arrow down from Phase 2 output, branching to Phase 4 and Phase 5 -->
  <path d="M380,240 L380,268" class="arrow"/>

  <!-- Phase 3 branch (left) -->
  <line x1="380" y1="268" x2="160" y2="268" class="arrow-branch"/>
  <path d="M160,268 L160,290" class="arrow"/>

  <rect x="60" y="290" width="200" height="44" class="phase-box"/>
  <rect x="60" y="290" width="200" height="22" fill="#7c3aed" class="phase-header"/>
  <text x="160" y="306" text-anchor="middle" class="phase-label">Phase 3 — Family Analysis</text>
  <text x="80" y="326" class="step-title">phrase_grouper</text>

  <rect x="60" y="342" width="200" height="22" class="output-box"/>
  <text x="70" y="358" class="file-label">curated_families.tsv</text>
  <path d="M160,334 L160,342" class="arrow"/>

  <!-- Phase 4 branch (center-left) -->
  <path d="M380,268 L380,290" class="arrow"/>

  <rect x="280" y="290" width="200" height="44" class="phase-box"/>
  <rect x="280" y="290" width="200" height="22" fill="#7c3aed" class="phase-header"/>
  <text x="380" y="306" text-anchor="middle" class="phase-label">Phase 4 — Strip Families</text>
  <text x="300" y="326" class="step-title">strip_phrases (families)</text>

  <rect x="510" y="294" width="180" height="36" class="output-box"/>
  <text x="520" y="310" class="file-label">cdes_no_</text>
  <text x="520" y="324" class="file-label">families.json</text>
  <path d="M480,314 L510,314" class="arrow"/>

  <!-- Arrow down from Phase 4 -->
  <path d="M380,334 L380,380" class="arrow"/>

  <!-- Phase 5 -->
  <rect x="200" y="380" width="360" height="56" class="phase-box"/>
  <rect x="200" y="380" width="360" height="22" fill="#16a34a" class="phase-header"/>
  <text x="380" y="396" text-anchor="middle" class="phase-label">Phase 5 — Phrase Mining (ITERATE)</text>
  <text x="220" y="422" class="step-title">Mine + discover + coalesce + curate</text>

  <!-- Phase 5 output -->
  <rect x="590" y="384" width="160" height="22" class="output-box"/>
  <text x="600" y="400" class="file-label">curated_phrases.tsv</text>
  <path d="M560,398 L590,398" class="arrow"/>

  <!-- Iterate loop (right side) -->
  <path d="M670,406 L670,440 Q670,450 660,450 L610,450 Q600,450 600,440 L600,436" class="arrow-loop"/>
  <text x="612" y="448" class="iterate-label">ITERATE</text>
  <text x="590" y="424" class="file-label-dim">param tuning</text>

  <!-- Arrow down -->
  <path d="M380,436 L380,470" class="arrow"/>

  <!-- Phase 6 -->
  <rect x="200" y="470" width="360" height="44" class="phase-box"/>
  <rect x="200" y="470" width="360" height="22" fill="#16a34a" class="phase-header"/>
  <text x="380" y="486" text-anchor="middle" class="phase-label">Phase 6 — Strip Phrases</text>
  <text x="220" y="506" class="step-title">strip_phrases (curated phrases)</text>

  <!-- Phase 6 output -->
  <rect x="590" y="474" width="160" height="36" class="output-box"/>
  <text x="600" y="490" class="file-label">cdes_cleaned</text>
  <text x="600" y="504" class="file-label">.json</text>
  <path d="M560,494 L590,494" class="arrow"/>

  <!-- Arrow down -->
  <path d="M380,514 L380,544" class="arrow"/>

  <!-- diagnose_strip -->
  <rect x="200" y="544" width="360" height="36" class="phase-box"/>
  <text x="220" y="567" class="step-title">diagnose_strip (global refinement)</text>

  <rect x="590" y="548" width="160" height="22" class="output-box"/>
  <text x="600" y="564" class="file-label">remaining.tsv</text>
  <path d="M560,562 L590,562" class="arrow"/>

  <!-- Loop back arrow from diagnose to Phase 1 -->
  <path d="M200,562 L30,562 Q20,562 20,552 L20,134 Q20,124 30,124 L60,124" class="arrow-loop"/>
  <text x="24" y="350" class="iterate-label" transform="rotate(-90 24,350)">restart workflow</text>

  <!-- Legend -->
  <rect x="10" y="588" width="14" height="14" class="input-box"/>
  <text x="30" y="600" style="font: 10px sans-serif; fill: #555;">Input</text>
  <rect x="100" y="588" width="14" height="14" class="output-box"/>
  <text x="120" y="600" style="font: 10px sans-serif; fill: #555;">Output file</text>
  <rect x="210" y="588" width="14" height="14" class="config-box"/>
  <text x="230" y="600" style="font: 10px sans-serif; fill: #555;">Config</text>
  <line x1="320" y1="595" x2="350" y2="595" class="arrow-loop"/>
  <text x="356" y="600" style="font: 10px sans-serif; fill: #555;">Iterate loop</text>
</svg>
