      - instrument_miner: help/instrument_miner.md
    - Phrase Detection:
      - phrase_miner: help/phrase_miner.md
      - phrase_grouper: help/phrase_grouper.md
      - phrase: help/phrase.md
      - phrase_builder: help/phrase_builder.md
    - Pattern Stripping:
      - strip_discover: help/strip_discover.md
