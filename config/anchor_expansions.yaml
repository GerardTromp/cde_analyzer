#
# File: config/anchor_expansions.yaml
#
# Pattern expansion configuration for strip_phrases.
# Prefixes are prepended, suffixes are appended to base patterns.
# All combinations are generated and sorted longest-first.
#
# Loading priority (later extends earlier):
#   1. Built-in defaults (fallback if no config found)
#   2. This file: config/anchor_expansions.yaml
#   3. Local override: ./anchor_expansions.yaml in working directory
#
# Local files extend (add to) these lists rather than replacing them.

# ---------------------------------------------------------------------------
# Anchor prefixes - prepended to patterns
# ---------------------------------------------------------------------------
# Listed longest-first for documentation; actual matching uses length sort.
# These are common phrases that introduce instrument/scale names.
# A trailing space is added automatically during expansion.
#
# Both lowercase and sentence-case variants are included because matching
# is case-sensitive. Sentence-case occurs after periods ("...score. As part of").

prefixes:
  # lowercase (mid-sentence)
  - "as a part of the"
  - "as a part of"
  - "as part of the"
  - "as part of"
  - "based on the"
  - "based on"
  - "a field of the"
  - "a field of"
  - "field of the"
  - "field of"
  - "related to the"
  - "related to"
  - "from the"
  - "from"
  # sentence-case (after period or start of field)
  - "As a part of the"
  - "As a part of"
  - "As part of the"
  - "As part of"
  - "Based on the"
  - "Based on"
  - "Related to the"
  - "Related to"
  - "A field of the"
  - "A field of"
  - "Field of the"
  - "Field of"
  - "From the"
  - "From"

# ---------------------------------------------------------------------------
# Trailing suffixes - appended to patterns
# ---------------------------------------------------------------------------
# Common trailing words that follow instrument names.
# A leading space is added automatically during expansion.
# Include both case variants since matching is literal.

suffixes:
  - "questionnaire"
  - "Questionnaire"
  - "form"
  - "Form"
  - "form."
  - "-"

# ---------------------------------------------------------------------------
# Regex prefixes - prepended to patterns using regex matching
# ---------------------------------------------------------------------------
# Unlike literal prefixes above, these use Python regex syntax.
# Useful for variable text like version numbers.
# A trailing space is included in the pattern (not auto-appended).
# Both case variants are handled by including re.IGNORECASE-compatible patterns.
#
# Expanded patterns are marked with "REGEX:" prefix in the phrase map
# so the matching engine uses re.search() instead of literal substring.

regex_prefixes:
  - "version \\d+(?:\\.\\d+)? of the "
  - "version \\d+(?:\\.\\d+)? of "
  - "Version \\d+(?:\\.\\d+)? of the "
  - "Version \\d+(?:\\.\\d+)? of "
