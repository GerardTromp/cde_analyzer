# Permanent skip abbreviations — domain constants that should never trigger
# re-evaluation regardless of corpus frequency changes.
#
# These are well-known medico-scientific abbreviations that are NOT instruments
# and never will be. They are exempt from k-fold tinyId growth re-evaluation
# during dictionary merge.
#
# Categories:
#   gene_protein    — HGNC/HUGO gene/protein nomenclature
#   anatomical      — Standard anatomical abbreviations
#   organization    — Government agencies, research institutes
#   study           — Major epidemiological studies/initiatives
#   coding_system   — Medical coding/classification systems
#   medical_term    — Standard medical terms/techniques/conditions
#   measurement     — Units and measurement abbreviations

permanent_skips:

