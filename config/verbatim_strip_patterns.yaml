# Verbatim Strip Patterns
#
# Patterns for direct stripping that escape the discovery logic.
# Unlike supplementary_patterns.yaml (used for instrument extraction),
# these patterns are matched EXACTLY as written and stripped directly.
#
# Use cases:
#   - Instrument variants with unusual formatting (parenthetical notes, versions)
#   - Patterns that appear without anchor prefixes ("as part of", etc.)
#   - Recurring patterns that would otherwise require manual curation each run
#
# Loading priority (later extends earlier):
#   1. This file: config/verbatim_strip_patterns.yaml (global, in project)
#   2. Local override: ./verbatim_strip_patterns.yaml (in working directory)
#
# Local files extend (add to) this list rather than replacing it.
# This allows rapid iteration during curation without modifying installed code.
#
# Format:
#   category_name:
#     - pattern: "exact text to strip"
#       replace_with: ""  # optional, defaults to empty string
#       note: "documentation note"  # optional
#
# Patterns are matched case-sensitively and stripped in longest-first order.
# Anchor expansion is applied automatically (patterns are tried with/without
# "as part of", "based on", etc. prefixes).

# =============================================================================
# Instrument name variants with version/form specifiers
# These include parenthetical notes that the main regex doesn't capture
# =============================================================================
instrument_variants:
  - pattern: "the Geriatric Depression Scale (short form) (GDSSF)"
    note: "Short form variant with acronym - appears 16x in corpus"

  - pattern: "Geriatric Depression Scale (short form) (GDSSF)"
    note: "Without leading 'the'"

  - pattern: "(short form) (GDSSF)"
    note: "Bare suffix left after main instrument name is stripped"

  - pattern: "the Geriatric Depression Scale (long form) (GDSLF)"
    note: "Long form variant with acronym - appears 15x in corpus"

  - pattern: "Geriatric Depression Scale (long form) (GDSLF)"
    note: "Without leading 'the'"

  - pattern: "(long form) (GDSLF)"
    note: "Bare suffix left after main instrument name is stripped"

  - pattern: "Patient Health Questionnaire (PHQ-9)"
    note: "PHQ-9 with parenthetical abbreviation - orphaned in ~10 CDEs"

  - pattern: "(PHQ-9)"
    note: "Bare parenthetical left after main instrument name is stripped"

  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticides (Work)"
    note: "Full RFQ-U Work variant - coalesced parent misses (Work) suffix"

  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticide (Work)"
    note: "Singular 'Pesticide' variant of RFQ-U Work"

  - pattern: "Risk Factor Questionnaire (RFQ-U) for Pesticides (Home)"
    note: "Full RFQ-U Home variant - coalesced parent misses (Home) suffix"

  - pattern: "(Work)"
    note: "Orphan parenthetical after RFQ-U instrument name is stripped"

  - pattern: "(Home)"
    note: "Orphan parenthetical after RFQ-U instrument name is stripped"

# =============================================================================
# Short-form instrument references
