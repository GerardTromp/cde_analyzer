# =============================================================================
# Boilerplate phrases (non-instrument)
# Recurring definition/designation fragments that should be stripped.
# These are applied to ALL records (no tinyId restriction), unlike curated
# patterns which are limited to their discovery set.
# Both case variants are needed because matching is case-sensitive.
# =============================================================================
boilerplate_temporal:
  - pattern: "In the past 7 days"
    note: "PROMIS/Neuro-QOL temporal prefix - appears in 300+ CDEs"

  - pattern: "in the past 7 days"
    note: "Lowercase variant (definitions, mid-sentence)"

  - pattern: "In the past 30 days"
    note: "Sexual function temporal prefix - appears in 30+ CDEs"

  - pattern: "in the past 30 days"
    note: "Lowercase variant"

  - pattern: "in the past"
    note: "Generic temporal prefix - catches other durations (14 days, etc.)"

  - pattern: "In the past"
    note: "Sentence-start variant"

  - pattern: "over the past week,"
    note: "Weekly temporal suffix with trailing comma"

  - pattern: "over the past week"
    note: "Without trailing comma"

  - pattern: "past week scale"
    note: "Scale type descriptor in designations"

  - pattern: "past 7 day frequency scale"
    note: "PROMIS frequency scale descriptor"

repository_typos:
  - pattern: "Patient- Reported Outcome Information Measurement System (PROMIS)"
    tinyIds: "Qyxv0pc6TL"
    note: "Transposed word order + spurious hyphen-space variant of PROMIS instrument name - 1 CDE"

  - pattern: "Patient-Reported Outcome Information Measurement System (PROMIS)"
    note: "Transposed word order variant of PROMIS instrument name - 1 CDE"

  - pattern: "Outcome Information Measurement System (PROMIS)"
    tinyIds: "Qyxv0pc6TL"
    note: "Transposed PROMIS suffix without Patient-Reported prefix - catches anchor-stripped variants"

# =============================================================================
# Sub-instrument residuals (delimiter-free variants)
# When CDEs use "PROMIS Anxiety" instead of "PROMIS - Anxiety", inst_full
# strips "PROMIS" but inst_sub misses " - Anxiety" (no dash).
#
# QC diagnostic: qc_sub_instrument_residuals.py scans stripped output for
# ^sub_name at start of field, tinyId-scoped to parent instrument set:
#   HIT = true residual (tinyId in parent set) → action needed
#   MISS = coincidence (tinyId not in parent set) → expected
#
# Round 2 results: 4 HITs (3x "test" from Grip Strength, 1x "Perceived"
# from NIH Toolbox) vs 349 MISSes. All multi-word sub-names ("Alcohol use",
# "Life Satisfaction", "Emotional support") were MISSes — the CDEs with
# those start-of-field phrases are NOT instrument CDEs.
# =============================================================================
# No verbatim patterns needed currently — only 4 single-word true residuals.
# Future: if residuals grow, add tinyId-scoped patterns here.

boilerplate_eyegene:
  - pattern: "This term was developed in collaboration with the National Institute of Health's National Eye Institute (NEI) as part of an effort to standardize the data elements collected by the National Ophthalmic Disease Genotyping and Phenotyping Network (eyeGENE)."
    note: "eyeGENE boilerplate definition - 105 CDEs. Full sentence including period."

