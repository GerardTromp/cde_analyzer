# Reference Curation Ledger — MANIFEST
#
# Official starting-point ledger for CDE text normalization pipelines.
# Contains curated decisions from the allcde03 corpus (22,743 CDEs).
#
# Curation strategy: Curator B (selected after three-curator comparison)
# Curators: A (conservative), B (moderate, production default), C (aggressive)
# See: phrase_curation3/reports/curator_strategy_analysis.md
#
# Usage:
#   Copy this directory to your project's .curation_ledger/ to bootstrap
#   incremental curation. The curation gate will auto-resolve patterns
#   that match prior decisions, presenting only new/changed patterns
#   for human review.
#
#   cp -r data/reference_ledger/ /path/to/project/.curation_ledger/
#
# For production stripping with pre-curated patterns (no curation gate),
# use the production_patterns/ subdirectory directly:
#
#   cde-analyzer workflow run workflows/production_strip.yaml \
#       --set input_json=/path/to/cdes.json \
#       --set output_dir=/path/to/output

