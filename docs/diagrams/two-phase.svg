<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9f7aea"/>
    </marker>
    <style>
      .title { font: bold 16px sans-serif; fill: #1a202c; }
      .phase-title { font: bold 14px sans-serif; fill: #2d3748; }
      .label { font: bold 12px sans-serif; fill: #2d3748; }
      .sublabel { font: 11px sans-serif; fill: #4a5568; }
      .code { font: 10px monospace; fill: #553c9a; }
      .box { fill: #ebf4ff; stroke: #4299e1; stroke-width: 2; rx: 6; }
      .box-phase1 { fill: #faf5ff; stroke: #9f7aea; stroke-width: 2; rx: 6; }
      .box-human { fill: #fffaf0; stroke: #ed8936; stroke-width: 2; rx: 6; }
      .box-output { fill: #f0fff4; stroke: #48bb78; stroke-width: 2; rx: 6; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-purple { stroke: #9f7aea; stroke-width: 2; fill: none; marker-end: url(#arrowhead-purple); }
      .note { font: 10px sans-serif; fill: #718096; font-style: italic; }
      .highlight { fill: #fefcbf; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">TWO-PHASE INSTRUMENT WORKFLOW</text>
  <text x="400" y="50" text-anchor="middle" class="sublabel">Extract and mask "as part of &lt;Instrument Name&gt; (&lt;ACRONYM&gt;)" patterns</text>

  <!-- Phase 1 Section -->
  <rect x="30" y="70" width="350" height="200" fill="#faf5ff" stroke="#9f7aea" stroke-width="1" rx="8" opacity="0.3"/>
  <text x="205" y="95" text-anchor="middle" class="phase-title" style="fill: #6b46c1">PHASE 1: Discovery</text>

  <!-- Phase 1 command -->
  <rect x="50" y="110" width="310" height="35" class="box-phase1"/>
  <text x="60" y="132" class="code">cde-analyzer phrase_miner -i data.json \</text>
  <text x="80" y="142" class="code">-o output/ --instruments-only</text>

  <!-- Arrow -->
  <line x1="205" y1="145" x2="205" y2="165" class="arrow-purple"/>

  <!-- Input example -->
  <rect x="50" y="170" width="310" height="45" fill="white" stroke="#9f7aea" rx="4"/>
  <text x="60" y="190" class="sublabel">Input text: "...as part of</text>
  <text x="60" y="205" class="code" style="fill: #6b46c1">Patient Health Questionnaire (PHQ-9)</text>
  <text x="295" y="205" class="sublabel">..."</text>

  <!-- Arrow -->
  <line x1="205" y1="215" x2="205" y2="235" class="arrow-purple"/>

  <!-- Output file -->
  <rect x="50" y="240" width="310" height="25" class="box-output"/>
  <text x="205" y="257" text-anchor="middle" class="label" style="fill: #276749">instruments_verbatim.tsv</text>

  <!-- Human curation section -->
  <rect x="420" y="70" width="350" height="200" fill="#fffaf0" stroke="#ed8936" stroke-width="1" rx="8" opacity="0.3"/>
  <text x="595" y="95" text-anchor="middle" class="phase-title" style="fill: #c05621">Human Curation</text>

  <!-- Arrow from Phase 1 to Human -->
  <line x1="360" y1="252" x2="420" y2="252" class="arrow"/>

  <!-- TSV example -->
  <rect x="440" y="110" width="310" height="120" fill="white" stroke="#ed8936" rx="4"/>
  <text x="450" y="130" class="label">instruments_verbatim.tsv</text>

  <!-- Table header -->
  <rect x="450" y="140" width="290" height="20" fill="#edf2f7"/>
  <text x="460" y="155" class="code" style="font-size: 9px">normalized_name          | full_match</text>

  <!-- Table rows -->
  <text x="460" y="175" class="code" style="font-size: 9px">patient health quest...  | as part of Patient...</text>
  <text x="460" y="190" class="code" style="font-size: 9px">brief pain inventory     | as part of Brief...</text>
  <rect x="450" y="198" width="290" height="15" class="highlight"/>
  <text x="460" y="210" class="code" style="font-size: 9px; fill: #c53030">false positive example   | as part of False...</text>
  <text x="600" y="225" class="note" style="fill: #c53030">← Delete this row</text>

  <!-- Phase 2 Section -->
  <rect x="30" y="290" width="740" height="170" fill="#ebf4ff" stroke="#4299e1" stroke-width="1" rx="8" opacity="0.3"/>
  <text x="400" y="315" text-anchor="middle" class="phase-title" style="fill: #2b6cb0">PHASE 2: Full Mining with Pre-masking</text>

  <!-- Arrow from Human to Phase 2 -->
  <line x1="595" y1="270" x2="595" y2="290" class="arrow"/>
  <text x="605" y="285" class="note">curated file</text>

  <!-- Phase 2 command -->
  <rect x="50" y="330" width="400" height="35" class="box"/>
  <text x="60" y="352" class="code">cde-analyzer phrase_miner -i data.json -o output/ \</text>
  <text x="80" y="362" class="code">--instrument-list instruments_verbatim.tsv,full_match</text>

  <!-- Arrow -->
  <line x1="250" y1="365" x2="250" y2="390" class="arrow"/>

  <!-- Pre-masking visualization -->
  <rect x="50" y="395" width="400" height="55" fill="white" stroke="#4299e1" rx="4"/>
  <text x="60" y="415" class="label">Pre-masking: Curated patterns masked BEFORE k-mer loop</text>
  <g transform="translate(60, 425)">
    <rect width="35" height="20" fill="#f7fafc" stroke="#e2e8f0"/>
    <text x="17" y="14" text-anchor="middle" class="code" style="font-size: 9px">as</text>
    <rect x="40" width="35" height="20" fill="#f7fafc" stroke="#e2e8f0"/>
    <text x="57" y="14" text-anchor="middle" class="code" style="font-size: 9px">part</text>
    <rect x="80" width="25" height="20" fill="#f7fafc" stroke="#e2e8f0"/>
    <text x="92" y="14" text-anchor="middle" class="code" style="font-size: 9px">of</text>
    <rect x="110" width="55" height="20" fill="#faf5ff" stroke="#9f7aea"/>
    <text x="137" y="14" text-anchor="middle" class="code" style="font-size: 9px">patient</text>
    <rect x="170" width="50" height="20" fill="#faf5ff" stroke="#9f7aea"/>
    <text x="195" y="14" text-anchor="middle" class="code" style="font-size: 9px">health</text>
    <rect x="225" width="45" height="20" fill="#faf5ff" stroke="#9f7aea"/>
    <text x="247" y="14" text-anchor="middle" class="code" style="font-size: 9px">quest</text>
  </g>
  <path d="M 170 450 L 170 455 L 270 455 L 270 450" fill="none" stroke="#9f7aea" stroke-width="1"/>
  <text x="220" y="465" text-anchor="middle" class="note" style="fill: #6b46c1; font-size: 8px">Pre-masked: won't appear as k-mer phrase</text>

  <!-- Output -->
  <rect x="500" y="350" width="250" height="100" class="box-output"/>
  <text x="625" y="375" text-anchor="middle" class="label" style="fill: #276749">Output Files</text>
  <text x="515" y="395" class="sublabel">phrases.tsv (without instrument noise)</text>
  <text x="515" y="415" class="sublabel">instruments.tsv (detected instruments)</text>
  <text x="515" y="435" class="sublabel">+ all other phrase outputs</text>

  <!-- Arrow from Phase 2 to Output -->
  <line x1="450" y1="400" x2="495" y2="400" class="arrow"/>

  <!-- Benefits note -->
  <rect x="30" y="480" width="740" height="50" fill="#f0fff4" stroke="#48bb78" rx="4"/>
  <text x="50" y="500" class="label" style="fill: #276749">Benefits:</text>
  <text x="120" y="500" class="sublabel">Instrument patterns are extracted once, curated manually, then used to clean phrase mining output.</text>
  <text x="50" y="520" class="sublabel">Prevents "Patient Health Questionnaire" fragments from appearing as separate high-frequency phrases.</text>
</svg>