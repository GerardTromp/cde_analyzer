# Workflow: 7-Way Branching Strip Pipeline
#
# Output filenames encode which pattern types are stripped:
#   M = Main (full) instrument, S = Sub instrument, P = Phrase
#   T = stripped, F = not stripped
#
# | Text removed                | M | S | P | Code   | Output file              |
# |-----------------------------|---|---|---|--------|--------------------------|
# | (None — original baseline)  | F | F | F | MFSFPF | (input_json)             |
# | Main instrument             | T | F | F | MTSFPF | stripped_MTSFPF.json     |
# | Sub instrument              | F | T | F | MFSTPF | stripped_MFSTPF.json     |
# | Main and sub instrument     | T | T | F | MTSTPF | stripped_MTSTPF.json     |
# | Phrases                     | F | F | T | MFSFPT | stripped_MFSFPT.json     |
# | Main instrument and phrases | T | F | T | MTSFPT | stripped_MTSFPT.json     |
# | Sub instrument and phrases  | F | T | T | MFSTPT | stripped_MFSTPT.json     |
# | Main, sub and phrases       | T | T | T | MTSTPT | stripped_MTSTPT.json     |
#
# Temporal phrases are automatically expanded from seed patterns in
# config/temporal_seed_patterns.yaml and stripped case-insensitively in a
# separate pass before curated phrase patterns (stripped case-sensitively).
#
# Prerequisites:
#   - Curated instrument patterns processed through --generate-strip-patterns
#     to produce {inst_patterns_base}_full.tsv and {inst_patterns_base}_sub.tsv
#   - Curated phrase patterns TSV
#
# If either phase produced substitute patterns, merge them and apply
# substitutions to the input JSON before running the branching strip:
#
#   cde-analyzer strip_phrases -i allcde.json -o substituted.json \
#       --patterns merged_substitute.tsv,pattern --no-expand-anchors
#
# Then pass substituted.json as input_json to this workflow.
#
# Usage:
#   cde-analyzer workflow run workflows/branching_strip.yaml \
#       --set input_json=/path/to/cdes.json \
#       --set output_dir=/path/to/output \
#       --set inst_patterns_base=/path/to/inst_patterns \
#       --set phrase_patterns=/path/to/curated_phrases.tsv
#
# Temporal patterns are stripped case-insensitively (--ignore-case) to catch
# title-case and ALL-CAPS forms in designations. Curated phrase patterns are
# stripped case-sensitively (verbatim expansion ensures controlled matching).
#
# Phrase stripping uses --word-boundary to prevent partial-word matches
# (e.g. "past 7 day" matching inside "past 7 days") and --clean-remnants
# to remove post-strip artifacts (orphan articles, floating punctuation).

name: branching_strip
description: "7-way branching strip: full/sub instrument × with/without phrases + combined"

variables:
  input_json: "${INPUT_JSON}"
  output_dir: "${OUTPUT_DIR}"
  model: "${MODEL:-CDE}"
  workers: 0
  version: "${VERSION:-}"

  # Instrument pattern files (from --generate-strip-patterns)
  # Base path without _full.tsv / _sub.tsv suffix
  inst_patterns_base: "${INST_PATTERNS_BASE}"
  inst_patterns_full: "${inst_patterns_base}_full.tsv"
  inst_patterns_sub: "${inst_patterns_base}_sub.tsv"

  # Phrase patterns (curated TSV with pattern + tinyIds columns)
  phrase_patterns: "${PHRASE_PATTERNS}"

  # Temporal expansion (auto-generated from config seeds)
  temporal_expanded_tsv: "${output_dir}/temporal_expanded.tsv"

  # Intermediate files (hidden dot-prefixed temporaries)
  inst_sub_on_full_tmp: "${output_dir}/.sub_on_full_MTSTPT_tmp.json"
  temporal_MFSFPT_tmp: "${output_dir}/.temporal_MFSFPT_tmp.json"
  temporal_MTSFPT_tmp: "${output_dir}/.temporal_MTSFPT_tmp.json"
  temporal_MFSTPT_tmp: "${output_dir}/.temporal_MFSTPT_tmp.json"
  temporal_MTSTPT_tmp: "${output_dir}/.temporal_MTSTPT_tmp.json"

  # Output files (M=main inst, S=sub inst, P=phrase; T=stripped, F=present)
  out_MTSFPF: "${output_dir}/stripped_MTSFPF.json"
  out_MFSTPF: "${output_dir}/stripped_MFSTPF.json"
  out_MTSTPF: "${output_dir}/stripped_MTSTPF.json"
  out_MFSFPT: "${output_dir}/stripped_MFSFPT.json"
  out_MTSFPT: "${output_dir}/stripped_MTSFPT.json"
  out_MFSTPT: "${output_dir}/stripped_MFSTPT.json"
  out_MTSTPT: "${output_dir}/stripped_MTSTPT.json"

steps:
  # ---- Instrument stripping (verbatim, anchor expansion ON) ----

  # [1] MTSFPF: Full instrument removal
  - name: strip_MTSFPF
    action: strip_phrases
    args:
      patterns: "${inst_patterns_full},pattern"
      input: "${input_json}"
      model: "${model}"
      output: "${out_MTSFPF}"
      workers: "${workers}"

  # [2] MFSTPF: Sub-group instrument removal (suffix retained)
  - name: strip_MFSTPF
    action: strip_phrases
    args:
      patterns: "${inst_patterns_sub},pattern"
      input: "${input_json}"
      model: "${model}"
      output: "${out_MFSTPF}"
      workers: "${workers}"

  # [3] MTSTPF: Apply sub-group patterns on top of full-stripped (instruments only)
  - name: sub_on_full_MTSTPF
    action: strip_phrases
    args:
      patterns: "${inst_patterns_sub},pattern"
      input: "${out_MTSFPF}"
      model: "${model}"
      output: "${out_MTSTPF}"
      workers: "${workers}"

  # [4] MTSTPT intermediate: Apply sub-group patterns on top of full-stripped
  #     output.  Same input/patterns as [3] but output is a temp for further stripping.
  - name: sub_on_full_MTSTPT
    action: strip_phrases
    args:
      patterns: "${inst_patterns_sub},pattern"
      input: "${out_MTSFPF}"
      model: "${model}"
      output: "${inst_sub_on_full_tmp}"
      workers: "${workers}"

  # [5] Expand temporal seed patterns from config
  - name: expand_temporal
    action: pattern_util
    args:
      expand_temporal_seeds: true
      output: "${temporal_expanded_tsv}"

  # ---- Temporal stripping (case-insensitive) ----
  # Temporal patterns stripped separately with --ignore-case to catch
  # title-case ("Past 7 Days") and ALL-CAPS ("LAST 4 WEEKS") forms.
  # No anchor expansion needed (temporal patterns are self-contained).

  # [6] MFSFPT intermediate: Temporal strip on raw input (phrase-only branch)
  - name: temporal_MFSFPT
    action: strip_phrases
    args:
      patterns: "${temporal_expanded_tsv},pattern"
      input: "${input_json}"
      model: "${model}"
      output: "${temporal_MFSFPT_tmp}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true
      ignore_case: true

  # [7] MTSFPT intermediate: Temporal strip on full-instrument-stripped input
  - name: temporal_MTSFPT
    action: strip_phrases
    args:
      patterns: "${temporal_expanded_tsv},pattern"
      input: "${out_MTSFPF}"
      model: "${model}"
      output: "${temporal_MTSFPT_tmp}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true
      ignore_case: true

  # [8] MFSTPT intermediate: Temporal strip on sub-instrument-stripped input
  - name: temporal_MFSTPT
    action: strip_phrases
    args:
      patterns: "${temporal_expanded_tsv},pattern"
      input: "${out_MFSTPF}"
      model: "${model}"
      output: "${temporal_MFSTPT_tmp}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true
      ignore_case: true

  # [9] MTSTPT intermediate: Temporal strip on full+sub instrument-stripped input
  - name: temporal_MTSTPT
    action: strip_phrases
    args:
      patterns: "${temporal_expanded_tsv},pattern"
      input: "${inst_sub_on_full_tmp}"
      model: "${model}"
      output: "${temporal_MTSTPT_tmp}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true
      ignore_case: true

  # ---- Curated phrase stripping (case-sensitive) ----
  # Curated phrases use verbatim expansion for controlled matching.
  # No anchor expansion needed (phrase patterns are self-contained).

  # [10] MFSFPT: Curated phrases on temporal-stripped input (phrase-only)
  - name: strip_MFSFPT
    action: strip_phrases
    args:
      patterns: "${phrase_patterns},pattern"
      input: "${temporal_MFSFPT_tmp}"
      model: "${model}"
      output: "${out_MFSFPT}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true

  # [11] MTSFPT: Curated phrases on full-instrument + temporal-stripped input
  - name: strip_MTSFPT
    action: strip_phrases
    args:
      patterns: "${phrase_patterns},pattern"
      input: "${temporal_MTSFPT_tmp}"
      model: "${model}"
      output: "${out_MTSFPT}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true

  # [12] MFSTPT: Curated phrases on sub-instrument + temporal-stripped input
  - name: strip_MFSTPT
    action: strip_phrases
    args:
      patterns: "${phrase_patterns},pattern"
      input: "${temporal_MFSTPT_tmp}"
      model: "${model}"
      output: "${out_MFSTPT}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true

  # [13] MTSTPT: Curated phrases on full+sub instrument + temporal-stripped input
  - name: strip_MTSTPT
    action: strip_phrases
    args:
      patterns: "${phrase_patterns},pattern"
      input: "${temporal_MTSTPT_tmp}"
      model: "${model}"
      output: "${out_MTSTPT}"
      workers: "${workers}"
      word_boundary: true
      clean_remnants: true
      no_expand_anchors: true

  # [14] Quality report — scans all stripped outputs for detritus and remnants
  - name: quality_report
    action: strip_report
    args:
      output_dir: "${output_dir}"
      input_json: "${input_json}"
      output: "${output_dir}/strip_report.md"
      version: "${version}"
      json_pattern: "stripped_*.json"
