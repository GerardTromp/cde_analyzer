# Workflow: Instrument Pattern Mining & Stripping (Phase 1)
#
# Executes the full instrument detection and stripping pipeline:
# 1. Mine instrument patterns from CDE JSON
# 2. Discover abbreviation-based patterns
# 3. Discover verbatim occurrences with variants
# 4. Coalesce redundant patterns
# 5. Curation gate (auto-resolve from prior ledger or present new patterns)
# 6. [CHECKPOINT] Human curator review (skipped if all auto-resolved)
# 7. Finalize curation (merge + update ledger)
# 8. Strip patterns from CDE JSON
#
# Usage:
#   cde-analyzer workflow run workflows/instrument_pipeline.yaml \
#       --set input_json=/path/to/cdes.json \
#       --set output_dir=/path/to/output

name: instrument_stripping
description: Phase 1 - Mine and strip instrument patterns from CDE records

variables:
  # Input/output paths - override with --set
  input_json: "${CDE_INPUT:-cdes.json}"
  output_dir: "${OUTPUT_DIR:-./phase1_output}"

  # Parallelization (0 = auto-detect with headroom)
  workers: 0

  # Curation ledger directory (persistent across re-runs)
  # Override with --set or CURATION_LEDGER env var
  curation_ledger_dir: "${CURATION_LEDGER:-../.curation_ledger}"

  # Intermediate files (derived from output_dir)
  instruments_tsv: "${output_dir}/instruments.tsv"
  families_tsv: "${output_dir}/instrument_families.tsv"
  # mined_patterns: Auto-generated patterns from mine_instruments (has 'pattern' column)
  # Used as input to discover_verbatim, before human curation
  mined_patterns_tsv: "${output_dir}/mined_patterns.tsv"
  abbrev_patterns: "${output_dir}/abbrev_patterns.tsv"
  discovered_tsv: "${output_dir}/discovered.tsv"
  coalesced_tsv: "${output_dir}/coalesced.tsv"
  coalesce_report: "${output_dir}/coalesce_report.tsv"
  validated_tsv: "${output_dir}/validated.tsv"
  # curated_tsv: Final curated patterns (auto-generated or human-edited)
  curated_tsv: "${output_dir}/curated.tsv"
  substitute_tsv: "${output_dir}/substitute_patterns.tsv"
  substituted_json: "${output_dir}/.substituted.json"
  stripped_json: "${output_dir}/inst_stripped.json"
  trace_tsv: "${output_dir}/strip_trace.tsv"
  sanity_check: "${output_dir}/sanity_check.tsv"
  # Field-enriched coalesced patterns (added by enrich_fields step)
  field_enriched_tsv: "${output_dir}/coalesced_fields.tsv"

steps:
  - name: mine_instruments
    action: instrument_miner
    args:
      input: "${input_json}"
      output: "${output_dir}/"
      detect_families: true
      family_summary: true
      extract_supplementary: true

  - name: discover_abbreviations
    action: strip_discover
    args:
      discover_abbreviations: "${instruments_tsv}"
      input: "${input_json}"
      output: "${abbrev_patterns}"
      workers: "${workers}"

  - name: discover_verbatim
    action: strip_discover
    args:
      input: "${input_json}"
      model: CDE
      output: "${discovered_tsv}"
      # Use mined_patterns (has 'pattern' column) not instruments.tsv (summary only)
      pattern_list: "${mined_patterns_tsv}"
      additional_patterns:
        - "${abbrev_patterns}"
      expand_variants: true
      discover_bare_names: true
      workers: "${workers}"

  - name: coalesce_patterns
    action: pattern_util
    args:
      coalesce_variants: "${discovered_tsv}"
      output: "${coalesced_tsv}"
      coalesce_report: "${coalesce_report}"
      min_prefix_tinyids: 2

  - name: validate_subsumption
    action: pattern_util
    args:
      validate_subsumption: "${coalesced_tsv}"
      input: "${input_json}"
      model: CDE
      workers: "${workers}"
      output: "${validated_tsv}"

  - name: enrich_fields
    action: pattern_util
    args:
      field_analysis: "${validated_tsv}"
      input: "${input_json}"
      model: CDE
      output: "${field_enriched_tsv}"

  - name: curation_gate
    action: pattern_util
    args:
      curation_gate: "${field_enriched_tsv}"
      ledger_dir: "${curation_ledger_dir}"
      input: "${input_json}"
      model: CDE
      phase: instrument
      output: "${output_dir}/"

  - name: curator_review
    checkpoint: true
    skip_if_file: "${curated_tsv}"
    message: |
      Instrument pattern curation required.

      New or changed patterns need review:
        - Review:        ${output_dir}/needs_review.tsv
        - Auto-resolved: ${output_dir}/auto_resolved.tsv
        - Gate summary:  ${output_dir}/gate_result.json
        - Coalesce report: ${coalesce_report}

      Open the editor:
        cde-analyzer pattern_util --edit ${output_dir}/needs_review.tsv

      Fill in the 'decision' column (keep / remove / modify / substitute)
      for each pattern. If decision = modify, enter the new pattern text
      in the 'modification' column. If decision = substitute, enter the
      replacement text in the 'modification' column.

      When ready, resume with:
        cde-analyzer workflow resume --state-file ${output_dir}/.workflow_state.json

  - name: finalize_curation
    action: pattern_util
    args:
      finalize_curation: "${output_dir}/"
      ledger_dir: "${curation_ledger_dir}"
      input: "${input_json}"
      phase: instrument

  - name: apply_substitutions
    action: strip_phrases
    args:
      input: "${input_json}"
      model: CDE
      output: "${substituted_json}"
      patterns: "${substitute_tsv},pattern"
      no_expand_anchors: true
      workers: "${workers}"

  - name: strip_instruments
    action: strip_phrases
    args:
      input: "${substituted_json}"
      model: CDE
      output: "${stripped_json}"
      patterns: "${curated_tsv},pattern"
      trace_matching: "${trace_tsv}"
      workers: "${workers}"

  - name: sanity_check
    action: diagnose_strip
    args:
      input: "${stripped_json}"
      model: CDE
      output: "${sanity_check}"
      min_count: 2
      suggest_patterns: true
      emit_tinyids: true
