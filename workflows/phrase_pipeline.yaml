# Workflow: Generic Phrase Mining & Stripping (Phase 2)
#
# Executes the generic phrase detection and stripping pipeline:
# 1. Mine phrases from instrument-stripped JSON
# 2. Discover verbatim occurrences with variants
# 3. Coalesce redundant patterns
# 4. Field analysis — enrich with per-field counts, apply filters
# 5. Curation gate (auto-resolve from prior ledger or present new patterns)
# 6. [CHECKPOINT] Human curator review (skipped if all auto-resolved)
# 7. Finalize curation (merge + update ledger)
# 8. Strip patterns from CDE JSON
#
# Prerequisites:
#   - Run instrument_pipeline.yaml first to get inst_stripped.json
#
# Usage:
#   cde-analyzer workflow run workflows/phrase_pipeline.yaml \
#       --set input_json=/path/to/inst_stripped.json \
#       --set output_dir=/path/to/phase2_output

name: phrase_stripping
description: Phase 2 - Mine and strip generic phrases from instrument-stripped CDE records

variables:
  # Input: usually output from Phase 1
  input_json: "${PHRASE_INPUT:-inst_stripped.json}"
  output_dir: "${OUTPUT_DIR:-./phase2_output}"

  # Phrase miner k-mer bounds (tokens per phrase)
  k_max: "${K_MAX:-25}"
  k_min: "${K_MIN:-3}"

  # Parallelization (0 = auto-detect with headroom)
  workers: 0

  # Curation ledger directory (persistent across re-runs)
  # Override with --set or CURATION_LEDGER env var
  curation_ledger_dir: "${CURATION_LEDGER:-../.curation_ledger}"

  # Text extension (post-loop recovery of truncated high-frequency phrases)
  prefix_consolidation: "${PREFIX_CONSOLIDATION:-true}"
  prefix_min_tinyids: "${PREFIX_MIN_TINYIDS:-20}"
  extension_min_pct: "${EXTENSION_MIN_PCT:-0.5}"
  extension_max_words: "${EXTENSION_MAX_WORDS:-5}"

  # Intermediate files
  phrases_tsv: "${output_dir}/verbatim_phrases.tsv"
  discovered_tsv: "${output_dir}/discovered.tsv"
  coalesced_tsv: "${output_dir}/coalesced.tsv"
  coalesce_report: "${output_dir}/coalesce_report.tsv"
  field_enriched_tsv: "${output_dir}/coalesced_fields.tsv"
  curated_tsv: "${output_dir}/curated.tsv"
  substitute_tsv: "${output_dir}/substitute_patterns.tsv"
  substituted_json: "${output_dir}/.substituted.json"
  stripped_json: "${output_dir}/final_stripped.json"
  trace_tsv: "${output_dir}/strip_trace.tsv"

  # Parent phrase tracking (propagates generic phrase info through pipeline)
  parent_column: "lemma_text"
  min_parent_tinyids: "${MIN_PARENT_TINYIDS:-20}"

  # Deferred parent filter: allow weak-parent patterns to participate in prefix
  # extraction before filtering. Rescues phrases with many low-count parents that
  # collectively form a strong prefix (e.g., "The free-text field related to").
  defer_parent_filter: "${DEFER_PARENT_FILTER:-true}"

  # High-frequency rescue: protect patterns with many actual tinyIds from
  # parent filtering, even when parent_count=0 (dedup/verbatim origin).
  # Prevents loss of high-frequency boilerplate like NEI/eyeGENE disclaimers.
  min_actual_tinyids: "${MIN_ACTUAL_TINYIDS:-20}"

  # Field analysis filters
  min_field_count: "${MIN_FIELD_COUNT:-6}"
  min_tokens: "${MIN_TOKENS:-3}"
  exclude_patterns: "${EXCLUDE_PATTERNS:-}"
  dedup_phrases_tsv: "${output_dir}/dedup_phrases.tsv"

  # Recall analysis (optional - provide ground truth patterns for tracking)
  # recall_source_json: original (pre-strip) JSON for ground truth matching
  # Defaults to input_json if not set; override when input_json is already stripped
  recall_source_json: "${RECALL_SOURCE_JSON:-${input_json}}"
  recall_patterns: "${RECALL_PATTERNS:-}"
  recall_tinyid_column: "${RECALL_TINYID_COLUMN:-tinyids}"
  recall_report_md: "${output_dir}/recall_report.md"
  recall_coalesced_tsv: "${output_dir}/recall_coalesced.tsv"
  recall_coalesced_md: "${output_dir}/recall_coalesced_detail.md"
  recall_stripped_tsv: "${output_dir}/recall_stripped.tsv"
  recall_stripped_md: "${output_dir}/recall_stripped_detail.md"

steps:
  - name: mine_phrases
    action: phrase_miner
    args:
      input: "${input_json}"
      output: "${output_dir}/"
      enable_subsumption: true
      k_max: "${k_max}"
      k_min: "${k_min}"
      ledger_dir: "${curation_ledger_dir}"
      prefix_consolidation: "${prefix_consolidation}"
      prefix_min_tinyids: "${prefix_min_tinyids}"
      extension_min_pct: "${extension_min_pct}"
      extension_max_words: "${extension_max_words}"

  - name: discover_verbatim
    action: strip_discover
    args:
      input: "${input_json}"
      model: CDE
      output: "${discovered_tsv}"
      pattern_list: "${phrases_tsv},verbatim_text"
      expand_variants: true
      workers: "${workers}"
      parent_column: "${parent_column}"

  - name: coalesce_patterns
    action: pattern_util
    args:
      coalesce_variants: "${discovered_tsv}"
      output: "${coalesced_tsv}"
      coalesce_report: "${coalesce_report}"
      min_prefix_tinyids: 2
      min_parent_tinyids: "${min_parent_tinyids}"
      defer_parent_filter: "${defer_parent_filter}"
      min_actual_tinyids: "${min_actual_tinyids}"
      no_trim_anchors: true

  - name: field_analysis
    action: pattern_util
    args:
      field_analysis: "${coalesced_tsv}"
      input: "${input_json}"
      model: CDE
      output: "${field_enriched_tsv}"
      min_field_count: "${min_field_count}"
      min_tokens: "${min_tokens}"
      exclude_patterns: "${exclude_patterns}"
      dedup_phrases: "${dedup_phrases_tsv}"

  - name: recall_coalesced
    action: recall_analyze
    condition: "${recall_patterns}"
    args:
      input: "${recall_source_json}"
      model: CDE
      pattern_file: "${recall_patterns}"
      pipeline_output: "${field_enriched_tsv}"
      pipeline_tinyid_column: "${recall_tinyid_column}"
      output: "${recall_coalesced_tsv}"
      markdown_report: "${recall_report_md}"
      markdown_detail: "${recall_coalesced_md}"
      report_version: "coalesced"
      min_recall: 0.7

  - name: curation_gate
    action: pattern_util
    args:
      curation_gate: "${field_enriched_tsv}"
      ledger_dir: "${curation_ledger_dir}"
      input: "${input_json}"
      model: CDE
      phase: phrase
      output: "${output_dir}/"

  - name: curator_review
    checkpoint: true
    skip_if_file: "${curated_tsv}"
    message: |
      Phrase pattern curation required.

      New or changed patterns need review:
        - Review:        ${output_dir}/needs_review.tsv
        - Auto-resolved: ${output_dir}/auto_resolved.tsv
        - Gate summary:  ${output_dir}/gate_result.json
        - Coalesce report: ${coalesce_report}
        - Recall report: ${recall_report_md} (if recall_patterns set)

      Open the editor:
        cde-analyzer pattern_util --edit ${output_dir}/needs_review.tsv

      Fill in the 'decision' column (keep / remove / modify / substitute)
      for each pattern. If decision = modify, enter the new pattern text
      in the 'modification' column. If decision = substitute, enter the
      replacement text in the 'modification' column.

      When ready, resume with:
        cde-analyzer workflow resume --state-file ${output_dir}/.workflow_state.json

  - name: finalize_curation
    action: pattern_util
    args:
      finalize_curation: "${output_dir}/"
      ledger_dir: "${curation_ledger_dir}"
      input: "${input_json}"
      phase: phrase

  - name: apply_substitutions
    action: strip_phrases
    args:
      input: "${input_json}"
      model: CDE
      output: "${substituted_json}"
      patterns: "${substitute_tsv},pattern"
      no_expand_anchors: true
      workers: "${workers}"

  - name: strip_phrases
    action: strip_phrases
    args:
      input: "${substituted_json}"
      model: CDE
      output: "${stripped_json}"
      patterns: "${curated_tsv},pattern"
      trace_matching: "${trace_tsv}"
      workers: "${workers}"

  - name: discovery_report
    action: discovery_report
    args:
      output_dir: "${output_dir}"
      pipeline: phrase
      output: "${output_dir}/discovery_report.md"
      input_json: "${input_json}"

  - name: recall_stripped
    action: recall_analyze
    condition: "${recall_patterns}"
    args:
      input: "${recall_source_json}"
      model: CDE
      pattern_file: "${recall_patterns}"
      pipeline_output: "${curated_tsv}"
      pipeline_tinyid_column: "${recall_tinyid_column}"
      output: "${recall_stripped_tsv}"
      markdown_report: "${recall_report_md}"
      markdown_detail: "${recall_stripped_md}"
      report_version: "post-strip"
      previous_report: "${recall_coalesced_tsv}"
      min_recall: 0.8
